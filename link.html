<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Sound</title>
</head>
<body>

    <button onclick="playSound()">Press Me</button>

    <!-- Audio file -->
    <audio id="mySound">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playSound() {
            let audio = document.getElementById("mySound");
            audio.play();
        }
    </script>

</body>
</html>
