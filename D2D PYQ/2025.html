<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D2D PYQ Master Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --black: #09090b; --black-muted: #27272a;
            --gray-dark: #52525b; --gray-light: #e4e4e7;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-blur: blur(24px);
            --smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f4f4f5 0%, #e4e4e7 100%);
            background-attachment: fixed;
            color: var(--black); margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= HOME DASHBOARD ================= */
        #home-view { padding: 40px 20px 100px 20px; max-width: 1000px; margin: 0 auto; }
        .hero-section { text-align: center; margin-bottom: 50px; }
        .hero-section h1 { font-size: 38px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .hero-section p.funny-tag { font-size: 16px; color: var(--gray-dark); font-weight: 600; background: var(--glass-bg); display: inline-block; padding: 10px 20px; border-radius: 30px; border: 1px solid var(--glass-border); }

        .section-title { font-size: 18px; font-weight: 800; text-transform: uppercase; color: var(--black-muted); margin: 40px 0 20px 0; border-bottom: 2px solid var(--black); display: inline-block; padding-bottom: 5px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        .combine-card {
            background: var(--black); color: var(--white); padding: 35px; border-radius: 20px; cursor: pointer; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: transform var(--smooth); grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center;
        }
        .combine-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .combine-card h2 { margin: 0 0 10px 0; font-size: 28px; font-weight: 800; }
        .combine-card p { margin: 0; color: #a1a1aa; font-size: 15px; font-weight: 500; }
        .combine-icon { background: var(--white); color: var(--black); padding: 15px 25px; border-radius: 50px; font-weight: 800; font-size: 14px; letter-spacing: 1px; }

        .year-card {
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); padding: 30px 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: all var(--smooth);
        }
        .year-card:hover { transform: translateY(-5px); background: var(--white); box-shadow: 0 12px 30px rgba(0,0,0,0.08); border-color: var(--white); }
        .year-card h3 { margin: 0; font-size: 32px; font-weight: 800; color: var(--black); }
        .year-card p { margin: 5px 0 0 0; font-size: 12px; font-weight: 700; color: var(--gray-dark); text-transform: uppercase; }

        /* ================= TEST & FILTER VIEW ================= */
        #test-view { display: none; padding-bottom: 120px; }

        .top-nav {
            position: sticky; top: 0; background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-bottom: 1px solid var(--glass-border); z-index: 1000; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: var(--white); border: 1px solid var(--gray-light); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
        .back-btn:hover { background: var(--black); color: var(--white); }

        /* Premium Filter UI */
        .filter-panel {
            background: var(--white); border-bottom: 1px solid var(--gray-light); padding: 30px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .filter-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; max-width: 1000px; margin: 0 auto;
        }
        .filter-group h4 { margin: 0 0 15px 0; font-size: 14px; text-transform: uppercase; color: var(--gray-dark); letter-spacing: 1px; }
        .chip-container { display: flex; flex-wrap: wrap; gap: 10px; }
        
        .chip {
            background: var(--bg-body); border: 1px solid var(--gray-light); color: var(--gray-dark); padding: 8px 18px; border-radius: 50px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; user-select: none;
        }
        .chip:hover { background: var(--gray-light); color: var(--black); }
        .chip.active { background: var(--black); color: var(--white); border-color: var(--black); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .toggle-filter-btn { background: transparent; border: 2px solid var(--black); font-weight: 800; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all 0.2s;}
        .toggle-filter-btn:hover { background: var(--black); color: var(--white); }

        .container { max-width: 800px; margin: 0 auto; padding: 24px; }

        /* Year & Subject Headers */
        .year-header {
            font-size: 24px; font-weight: 800; color: var(--black); margin: 50px 0 20px 0; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid var(--gray-light); padding-bottom: 10px;
        }
        .year-header::before { content: '📅'; font-size: 28px; }
        .subject-badge {
            display: inline-block; background: var(--black-muted); color: var(--white); padding: 6px 15px; border-radius: 8px; font-size: 14px; font-weight: 700; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase;
        }

        /* Question Cards */
        .q-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: 24px; padding: 35px; margin-bottom: 24px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px rgba(0,0,0,0.03); transition: transform 0.2s; }
        .q-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.06); }
        .q-meta { font-size: 12px; font-weight: 800; color: var(--gray-dark); text-transform: uppercase; margin-bottom: 20px; display: flex; gap: 10px; }
        .q-meta span { background: var(--white); padding: 5px 12px; border-radius: 12px; border: 1px solid var(--gray-light); }
        .q-text { font-size: 18px; font-weight: 600; margin-bottom: 25px; line-height: 1.6; color: var(--black); }
        
        .options-grid { display: flex; flex-direction: column; gap: 14px; }
        .opt-label { padding: 16px 20px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.5); cursor: pointer; font-size: 16px; font-weight: 500; display: flex; align-items: center; transition: all var(--smooth); }
        .opt-label input { position: absolute; opacity: 0; }
        .custom-radio { width: 22px; height: 22px; min-width: 22px; border: 2px solid var(--gray-dark); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; }
        .opt-label input:checked ~ .custom-radio { border-color: var(--black); }
        .opt-label input:checked ~ .custom-radio::after { content: ''; width: 12px; height: 12px; background: var(--black); border-radius: 50%; }
        .opt-label.selected-bg { border-color: var(--black); background: var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Floating Submit Button */
        .bottom-action-bar {
            position: fixed; bottom: 30px; right: 30px; z-index: 1000;
            opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bottom-action-bar.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .btn-submit {
            background: var(--black); color: var(--white); border: none; padding: 18px 36px; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; transition: transform 0.2s;
        }
        .btn-submit:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }

        /* End Anchor for Submit Trigger */
        #scroll-anchor { height: 20px; width: 100%; margin-top: 20px; }

        /* Results */
        .correct-opt { border-color: var(--black) !important; background: var(--white) !important; color: var(--black); font-weight: 700; }
        .wrong-opt { border-color: var(--gray-dark) !important; background: transparent !important; color: var(--gray-dark); opacity: 0.6; text-decoration: line-through; }
        .result-dashboard { display: none; text-align: center; background: var(--glass-bg); backdrop-filter: var(--glass-blur); padding: 50px; border-radius: 30px; margin-top: 40px; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 800; margin: 0 auto 20px auto; border: 8px solid var(--black); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        @media (max-width: 800px) {
            .filter-grid { grid-template-columns: 1fr; gap: 20px; }
            .hero-section h1 { font-size: 30px; }
            .combine-card { flex-direction: column; text-align: center; gap: 15px; }
            .bottom-action-bar { bottom: 20px; right: 20px; }
            .btn-submit { padding: 15px 25px; font-size: 14px; }
            .q-card { padding: 25px; }
        }
    </style>
</head>

        // ================= APP LOGIC =================
        const yearsList = [2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017];
        const subjectsList = ["Physics", "Chemistry", "Math"];
        
        let activeYears = [];
        let activeSubjects = [];
        let activeChapters = [];

        window.onload = () => {
            const grid = document.getElementById('year-grid');
            yearsList.forEach(y => {
                grid.innerHTML += `
                    <div class="year-card" onclick="openYearTest(${y})">
                        <h3>${y}</h3>
                        <p>Physics • Chem • Math</p>
                    </div>
                `;
            });
        };

        function goHome() {
            document.getElementById('test-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('filter-panel').style.display = 'none';
        }

        function openYearTest(year) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('test-view').style.display = 'block';
            document.getElementById('test-title').innerText = `${year} Full Paper`;
            document.getElementById('filter-panel').style.display = 'none';

            activeYears = [year];
            activeSubjects = [...subjectsList]; 
            activeChapters = []; 
            
            renderFilters();
            renderQuestions();
        }

        function openCombineFilter() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('test-view').style.display = 'block';
            document.getElementById('test-title').innerText = "Combine Research Lab 🧪";
            
            activeYears = [...yearsList];
            activeSubjects = [...subjectsList];
            activeChapters = [];
            
            document.getElementById('filter-panel').style.display = 'block';
            renderFilters();
            renderQuestions();
        }

        function toggleFilterPanel() {
            const panel = document.getElementById('filter-panel');
            panel.style.display = panel.style.display === 'none' || panel.style.display === '' ? 'block' : 'none';
        }

        // ================= FILTERS =================
        function toggleFilterArray(array, value) {
            const index = array.indexOf(value);
            if (index > -1) array.splice(index, 1);
            else array.push(value);
            renderFilters();
            renderQuestions();
        }

        function renderFilters() {
            const fYears = document.getElementById('f-years');
            fYears.innerHTML = '';
            yearsList.forEach(y => {
                const isActive = activeYears.includes(y) ? 'active' : '';
                fYears.innerHTML += `<div class="chip ${isActive}" onclick="toggleFilterArray(activeYears, ${y})">${y}</div>`;
            });

            const fSubj = document.getElementById('f-subjects');
            fSubj.innerHTML = '';
            subjectsList.forEach(s => {
                const isActive = activeSubjects.includes(s) ? 'active' : '';
                fSubj.innerHTML += `<div class="chip ${isActive}" onclick="toggleFilterArray(activeSubjects, '${s}')">${s}</div>`;
            });

            let availableChapters = [];
            questionBank.forEach(q => {
                if (activeYears.includes(q.year) && activeSubjects.includes(q.subject)) {
                    if (!availableChapters.includes(q.chapter)) availableChapters.push(q.chapter);
                }
            });

            activeChapters = activeChapters.filter(c => availableChapters.includes(c));

            const fChap = document.getElementById('f-chapters');
            fChap.innerHTML = availableChapters.length === 0 ? '<span style="font-size:12px; color:gray;">No chapters available</span>' : '';
            
            availableChapters.forEach(c => {
                const isActive = activeChapters.includes(c) ? 'active' : '';
                fChap.innerHTML += `<div class="chip ${isActive}" onclick="toggleFilterArray(activeChapters, '${c}')">${c}</div>`;
            });
        }

        function updateOptionStyle(radioInput) {
            const name = radioInput.name;
            document.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
                inp.parentElement.classList.remove('selected-bg');
            });
            radioInput.parentElement.classList.add('selected-bg');
        }

        // ================= RENDERING & SORTING =================
        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            const existingRes = document.querySelector('.result-dashboard');
            if(existingRes) existingRes.remove();
            document.getElementById('bottom-bar').classList.remove('show');

            let filteredData = questionBank.filter(q => {
                return activeYears.includes(q.year) && activeSubjects.includes(q.subject) && (activeChapters.length === 0 || activeChapters.includes(q.chapter));
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 60px; color:var(--gray-dark); font-weight:bold; font-size:18px;">No questions match your filter. 😢</div>`;
                return;
            }

            // SORTING LOGIC: Descending Year -> Ascending Subject
            filteredData.sort((a, b) => {
                if (b.year !== a.year) return b.year - a.year; // Year DESC
                if (a.subject !== b.subject) return a.subject.localeCompare(b.subject); // Subject ASC
                return a.id - b.id;
            });

            let currentYear = null;
            let currentSubject = null;

            filteredData.forEach((q, index) => {
                // UI: Insert Year Header if Year Changes
                if (q.year !== currentYear) {
                    currentYear = q.year;
                    container.innerHTML += `<div class="year-header">Year: ${currentYear}</div>`;
                    currentSubject = null; // Reset Subject for new year
                }

                // UI: Insert Subject Badge if Subject Changes
                if (q.subject !== currentSubject) {
                    currentSubject = q.subject;
                    container.innerHTML += `<div class="subject-badge">${currentSubject}</div>`;
                }

                let optionsHtml = q.options.map((opt, i) => `
                    <label class="opt-label" id="lbl-q${q.id}-o${i}">
                        <input type="radio" name="q${q.id}" value="${i}" onchange="updateOptionStyle(this)">
                        <div class="custom-radio"></div>
                        <span>${['A', 'B', 'C', 'D'][i]}) ${opt}</span>
                    </label>
                `).join('');

                container.innerHTML += `
                    <div class="q-card fade-in" style="animation-delay: ${index * 0.05}s" data-id="${q.id}" data-ans="${q.answer}">
                        <div class="q-meta">
                            <span>#ID-${q.id}</span>
                            <span>${q.chapter}</span>
                        </div>
                        <div class="q-text">Q. ${q.text}</div>
                        <div class="options-grid">${optionsHtml}</div>
                    </div>
                `;
            });

            // Re-render MathJax
            if(window.MathJax) {
                MathJax.typesetPromise([container]).catch((err) => console.log(err.message));
            }
        }

        // ================= SCROLL TRIGGER FOR SUBMIT BUTTON =================
        const observer = new IntersectionObserver((entries) => {
            const bottomBar = document.getElementById('bottom-bar');
            // If the anchor at the bottom of the page enters viewport, show button
            if (entries[0].isIntersecting && document.querySelectorAll('.q-card').length > 0) {
                bottomBar.classList.add('show');
            } else {
                bottomBar.classList.remove('show');
            }
        }, { threshold: 0.1 });

        // Observe the hidden anchor div
        setTimeout(() => observer.observe(document.getElementById('scroll-anchor')), 1000);

        // ================= SUBMIT TEST =================
        function submitTest() {
            document.getElementById('bottom-bar').classList.remove('show');
            document.getElementById('filter-panel').style.display = 'none';

            let score = 0;
            const cards = document.querySelectorAll('.q-card');

            cards.forEach(card => {
                const qId = card.dataset.id;
                const correctAns = parseInt(card.dataset.ans);
                const selected = document.querySelector(`input[name="q${qId}"]:checked`);

                const correctLabel = document.getElementById(`lbl-q${qId}-o${correctAns}`);
                correctLabel.classList.add('correct-opt');

                if (selected) {
                    const selectedVal = parseInt(selected.value);
                    if (selectedVal === correctAns) score++;
                    else {
                        const wrongLabel = document.getElementById(`lbl-q${qId}-o${selectedVal}`);
                        wrongLabel.classList.add('wrong-opt');
                    }
                }
            });

            document.querySelectorAll('.opt-label input').forEach(inp => inp.disabled = true);
            
            const container = document.getElementById('quiz-container');
            const resultHtml = `
                <div class="result-dashboard fade-in" style="display:block;">
                    <h2 style="margin-top:0; color:var(--black); font-weight:800;">Report Card 📋</h2>
                    <div class="score-circle">${score}/${cards.length}</div>
                    <p style="color:var(--gray-dark); font-weight:600;">Review your answers below.</p>
                    <button class="btn-submit" style="margin: 20px auto 0 auto;" onclick="renderQuestions(); window.scrollTo(0,0);">Re-Attempt Assessment</button>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', resultHtml);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
