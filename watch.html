<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    :root {
      --pdf-scale: 1;
      --ink: #000000;
      --ink-soft: #434343;
      --amber: #fbbf24;
      --amber-deep: #f59e0b;
      --paper: #f9f9f9;
      --surface: #ffffff;
      --muted: #666666;
      --header-h: 70px;
      --tip-h: 0px;
      --font-ui: 'Montserrat', sans-serif;
      --font-brand: 'Archivo Black', sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media print { html, body { display: none !important; } }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-ui);
      color: var(--ink);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(251, 191, 36, 0.12), transparent 55%),
        radial-gradient(ellipse 70% 40% at 100% 0%, rgba(0, 0, 0, 0.06), transparent 50%),
        linear-gradient(180deg, #f3f3f3 0%, var(--paper) 40%, #ffffff 100%);
      user-select: none;
      -webkit-user-select: none;
      transition: filter 0.3s ease;
      overflow: hidden;
      touch-action: none;
    }

    .header {
      position: absolute;
      top: 0; left: 0;
      z-index: 1000;
      width: 100%;
      height: calc(var(--header-h) + var(--safe-top));
      padding: var(--safe-top) 18px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      color: #fff;
      background: linear-gradient(135deg, #000000 0%, #434343 100%);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.28);
      pointer-events: auto;
      animation: headerIn 0.45s ease both;
    }

    .header::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
      opacity: 0.85;
    }

    @keyframes headerIn {
      from { transform: translateY(-12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header-left { justify-self: start; }
    .header-right {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      color: #fff;
      text-decoration: none;
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.82rem;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.75);
      transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }
    .back-btn:hover {
      background: #fff;
      color: #000;
      transform: translateY(-1px);
    }

    .brand-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
      text-align: center;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 0 0 1.5px rgba(251, 191, 36, 0.45);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      min-width: 0;
    }

    .brand-title {
      font-family: var(--font-brand);
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.2px;
      color: #fff;
      line-height: 1.05;
      white-space: nowrap;
    }
    .brand-title .accent {
      background: linear-gradient(135deg, var(--amber) 0%, #fde68a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-sub {
      font-family: var(--font-ui);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(251, 191, 36, 0.92);
    }

    #status {
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(8px);
      padding: 7px 11px;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--amber);
      border: 1px solid rgba(251, 191, 36, 0.4);
      white-space: nowrap;
    }

    .download-btn {
      background: #fff;
      color: #000;
      border: none;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 10px;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(255, 255, 255, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      align-items: center;
      gap: 6px;
      display: inline-flex;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 255, 255, 0.22);
      background: var(--amber);
    }
    .download-btn:active { transform: translateY(0); }

    .download-btn.locked {
      background: rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: none;
    }
    .download-btn.locked:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: none;
    }

    .zoom-tip {
      display: none;
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100%;
      height: var(--tip-h);
      z-index: 950;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-ui);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #444;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    .zoom-tip strong { color: var(--amber-deep); font-weight: 800; }

    .watermark-overlay {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top) + var(--tip-h)); left: 0;
      width: 100%;
      height: calc(100vh - var(--header-h) - var(--safe-top) - var(--tip-h));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      justify-items: center;
      align-items: center;
      overflow: hidden;
      z-index: 900;
      pointer-events: none;
    }

    .wm-item {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.07);
      transform: rotate(-35deg);
      text-align: center;
      line-height: 1.4;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .loader-container {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      background:
        radial-gradient(circle at 30% 40%, rgba(251, 191, 36, 0.1), transparent 45%),
        linear-gradient(135deg, #000000 0%, #434343 100%);
      animation: fadeBoot 0.35s ease both;
    }

    @keyframes fadeBoot {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader-brand {
      font-family: var(--font-brand);
      font-size: clamp(1.2rem, 5vw, 1.55rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.4px;
      text-align: center;
    }
    .loader-brand span,
    .loader-brand .accent { color: var(--amber); }

    .loader {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--amber);
      border-right-color: #fff;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      margin: 0;
      font-family: var(--font-ui);
      color: rgba(255, 255, 255, 0.78);
      font-weight: 500;
      font-size: 0.9rem;
      text-align: center;
    }

    .loader-container.is-error {
      background: linear-gradient(180deg, #f9f9f9 0%, #fff 100%);
    }
    .loader-container.is-error .loader-text {
      color: #b71c1c;
      font-weight: 700;
      max-width: 280px;
    }

    .scroll-area {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top) + var(--tip-h));
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--header-h) - var(--safe-top) - var(--tip-h) - var(--safe-bottom));
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      z-index: 10;
      pointer-events: auto;
      overscroll-behavior: contain;
    }

    .pdf-viewer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px calc(36px + var(--safe-bottom));
      gap: 18px;
      width: calc(100% * var(--pdf-scale));
      transform-origin: top left;
      animation: pagesIn 0.5s ease 0.05s both;
    }

    @keyframes pagesIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      max-width: 900px;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: 12px;
    }

    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    /* —— Phone / small screens —— */
    @media (max-width: 700px) {
      :root {
        --header-h: 58px;
        --tip-h: 34px;
      }

      .header {
        padding: var(--safe-top) 10px 0;
        gap: 6px;
      }

      .brand-logo { width: 24px; height: 24px; border-radius: 6px; }

      .brand-title {
        font-size: 0.86rem;
        letter-spacing: 0;
      }

      .brand-sub { display: none; }

      .back-btn {
        min-height: 40px;
        min-width: 40px;
        padding: 0;
        justify-content: center;
        border-width: 1.5px;
      }
      .back-btn .back-label { display: none; }

      #status {
        padding: 0;
        width: 40px;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0;
        border-radius: 10px;
        position: relative;
      }
      #status::before {
        content: 'HD';
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--amber);
      }

      .download-btn {
        min-height: 40px;
        padding: 0 12px;
        font-size: 0.75rem;
        gap: 4px;
      }
      .download-btn svg { width: 15px; height: 15px; }

      .zoom-tip { display: flex; }

      .wm-item {
        font-size: 9px;
        color: rgba(0, 0, 0, 0.05);
      }
      .watermark-overlay {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }

      .pdf-viewer-container {
        padding: 10px 8px calc(24px + var(--safe-bottom));
        gap: 12px;
      }

      .page-wrapper {
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      }

      canvas { border-radius: 8px; }

      .loader-text { font-size: 0.84rem; padding: 0 12px; }
    }

    @media (max-width: 380px) {
      .brand-title .brand-mind { display: none; }
      .download-btn #dl-text { display: none; }
      .download-btn { min-width: 40px; padding: 0; justify-content: center; }
      #status { display: none; }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="header">
    <div class="header-left">
      <a href="lecture.html" class="back-btn" onclick="window.history.back(); return false;" aria-label="Back">
        <span>←</span> <span class="back-label">Back</span>
      </a>
    </div>

    <div class="brand-block">
      <img class="brand-logo" src="small-logo.png" alt="" width="28" height="28">
      <div class="brand-text">
        <div class="brand-title">PREM<span class="accent">ium</span> <span class="brand-mind">Mind</span></div>
        <div class="brand-sub">Secure Reader</div>
      </div>
    </div>

    <div class="header-right">
      <div id="status">Secure HD</div>
      <button id="downloadBtn" class="download-btn" type="button">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="dl-text">Save</span>
      </button>
    </div>
  </div>

  <div class="zoom-tip" aria-hidden="true">Pinch to zoom · <strong>Secure</strong> reading mode</div>

  <div class="watermark-overlay" id="wmLayer">
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader-brand">PREM<span class="accent">ium</span> Mind</div>
     <div class="loader"></div>
     <p class="loader-text">Loading secure notes...</p>
  </div>

  <div class="scroll-area" id="scrollArea">
      <div class="pdf-viewer-container" id="pdfContainer"></div>
  </div>

  <script>
     // =========================================================
     // 1. GLOBAL NATIVE ZOOM BLOCKER
     // =========================================================
     document.addEventListener('touchmove', function(e) {
         if (e.touches && e.touches.length > 1) { e.preventDefault(); }
     }, { passive: false });

     // =========================================================
     // 2. CUSTOM PINCH-TO-ZOOM FOR PDF ONLY
     // =========================================================
     const scrollArea = document.getElementById('scrollArea');
     let currentScale = 1, initialDistance = 0, initialScale = 1;

     scrollArea.addEventListener('touchstart', (e) => {
         if (e.touches.length === 2) {
             initialDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             initialScale = currentScale;
         }
     }, {passive: false});

     scrollArea.addEventListener('touchmove', (e) => {
         if (e.touches.length === 2) {
             e.preventDefault(); 
             const currentDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             currentScale = initialScale * (currentDistance / initialDistance);
             currentScale = Math.max(1, Math.min(currentScale, 3.5));
             document.documentElement.style.setProperty('--pdf-scale', currentScale);
         }
     }, {passive: false});

     // =========================================================
     // 3. FETCH PHONE & SET WATERMARK
     // =========================================================
     const userEmail = localStorage.getItem('customUserEmail');
     
     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) { console.error("Failed to fetch phone number"); }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     // =========================================================
     // 4. SECURITY: ANTI-SCREENSHOT & BLUR
     // =========================================================
     window.addEventListener('blur', () => { document.body.classList.add('secure-mode'); });
     window.addEventListener('focus', () => { document.body.classList.remove('secure-mode'); });

     document.addEventListener('keydown', (e) => {
         if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText('Screenshots not allowed');
            document.body.classList.add('secure-mode');
            setTimeout(() => document.body.classList.remove('secure-mode'), 2000);
         }
     });

     // =========================================================
     // 5. PDF SECURE FETCH (short-lived one-time tokens — no secret in JS)
     // =========================================================
     const API_BASE = 'https://premind.diplomawallah.in';
     const urlParams = new URLSearchParams(window.location.search);
     // Prefer ?file=uploads/pdfs/...  (legacy ?pdf= full proxy URL still supported)
     let pdfFile = urlParams.get('file');
     let legacyPdf = urlParams.get('pdf');
     let allowDownload = urlParams.get('download') === 'true' || urlParams.get('download') === '1';
     let customTitle = urlParams.get('title');

     if (!pdfFile && legacyPdf) {
         try {
             const u = new URL(legacyPdf, API_BASE);
             if (u.pathname.includes('proxy_pdf.php') && u.searchParams.get('file')) {
                 pdfFile = u.searchParams.get('file');
             } else if (legacyPdf.indexOf('uploads/pdfs/') === 0) {
                 pdfFile = legacyPdf;
             }
         } catch (e) {
             if (String(legacyPdf).indexOf('uploads/pdfs/') === 0) pdfFile = legacyPdf;
         }
     }

     async function getPdfToken(purpose) {
         const res = await fetch(`${API_BASE}/get_pdf_token.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, purpose })
         });
         const data = await res.json().catch(() => ({}));
         if (!res.ok || data.status !== 'success' || !data.token) {
             throw new Error(data.message || 'Token request failed');
         }
         return data.token;
     }

     // POST + one-time token — Network tab URL se dubara download nahi hoga
     async function fetchSecurePdfBytes(purpose) {
         const token = await getPdfToken(purpose);
         const res = await fetch(`${API_BASE}/proxy_pdf.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, token })
         });
         if (!res.ok) throw new Error('Unauthorized Access or Invalid Token');
         const buf = await res.arrayBuffer();
         return buf;
     }

     if (pdfFile) {
         const downloadBtn = document.getElementById('downloadBtn');

         if (!allowDownload) {
             downloadBtn.classList.add('locked');
             document.getElementById('dl-text').innerText = "Locked";
         }

         downloadBtn.addEventListener('click', async () => {
             if (!allowDownload) {
                 alert("⚠️ Download available day of exam at 6:00 AM only.");
                 return;
             }

             const originalHtml = downloadBtn.innerHTML;
             downloadBtn.innerHTML = "⏳ Wait...";
             downloadBtn.disabled = true;

             try {
                 const buf = await fetchSecurePdfBytes('download');
                 const blob = new Blob([buf], { type: 'application/pdf' });
                 const blobUrl = URL.createObjectURL(blob);

                 let baseName = "Premium_Notes";
                 if (customTitle) {
                     baseName = decodeURIComponent(customTitle).replace(/[^a-zA-Z0-9 ]/g, "_");
                 } else {
                     const extractedName = pdfFile.substring(pdfFile.lastIndexOf('/') + 1);
                     if (extractedName) baseName = extractedName.replace(/\.pdf$/i, "");
                 }

                 const a = document.createElement('a');
                 a.href = blobUrl;
                 a.download = `${baseName}_PREMium_Mind.pdf`;
                 document.body.appendChild(a);
                 a.click();
                 document.body.removeChild(a);
                 URL.revokeObjectURL(blobUrl);
                 downloadBtn.innerHTML = "✅ Done";
             } catch (error) {
                 alert("Download Failed: Connection secure layer active.");
                 downloadBtn.innerHTML = "❌ Failed";
             }

             setTimeout(() => {
                 downloadBtn.innerHTML = originalHtml;
                 downloadBtn.disabled = false;
             }, 2000);
         });
     }

     // =========================================================
     // 6. RENDER HD PDF (ArrayBuffer — no permanent secret / reusable URL)
     // =========================================================
     if (pdfFile) {
         const container = document.getElementById('pdfContainer');
         const loadingState = document.getElementById('loadingState');

         fetchSecurePdfBytes('view')
         .then(async (pdfData) => {
             pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

             const pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
             // Drop reference so casual console reuse is harder
             pdfData = null;

             for (let num = 1; num <= pdfDoc.numPages; num++) {
                 const page = await pdfDoc.getPage(num);
                 const scale = 2.0;
                 const viewport = page.getViewport({ scale });

                 const wrapper = document.createElement('div');
                 wrapper.className = 'page-wrapper';

                 const canvas = document.createElement('canvas');
                 const ctx = canvas.getContext('2d', { alpha: false });
                 const dpr = window.devicePixelRatio || 1;

                 canvas.width = Math.floor(viewport.width * dpr);
                 canvas.height = Math.floor(viewport.height * dpr);

                 const transform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;
                 wrapper.appendChild(canvas);
                 container.appendChild(wrapper);

                 await page.render({ canvasContext: ctx, transform: transform, viewport: viewport }).promise;
             }

             loadingState.style.display = 'none';
         })
         .catch(err => {
             loadingState.classList.add('is-error');
             loadingState.innerHTML = "<p class='loader-text'>Access Denied. Secure Connection Failed.</p>";
             console.error(err);
         });
     } else {
         const loadingState = document.getElementById('loadingState');
         loadingState.classList.add('is-error');
         loadingState.innerHTML = "<p class='loader-text'>No PDF file provided.</p>";
     }
