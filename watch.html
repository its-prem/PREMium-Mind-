<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    :root {
      --pdf-scale: 1;
      --ink: #111111;
      --muted: #6b7280;
      --line: #ececec;
      --amber: #f59e0b;
      --amber-soft: #fff7e6;
      --bg: #ffffff;
      --page-bg: #f7f7f8;
      --header-h: 68px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: 'Outfit', system-ui, sans-serif;
      --display: 'Fraunces', Georgia, serif;
    }

    @media print { html, body { display: none !important; } }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      color: var(--ink);
      background: var(--page-bg);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      transition: filter 0.3s ease;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header {
      position: absolute;
      top: 0; left: 0;
      z-index: 1000;
      width: 100%;
      height: calc(var(--header-h) + var(--safe-top));
      padding: var(--safe-top) 16px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9), 0 10px 28px rgba(17, 17, 17, 0.05);
      pointer-events: auto;
      animation: headerIn 0.4s ease both;
    }

    @keyframes headerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      justify-self: start;
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.84rem;
      min-height: 44px;
      padding: 0 16px 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px rgba(17, 17, 17, 0.05), 0 6px 16px rgba(17, 17, 17, 0.04);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover {
      background: var(--amber-soft);
      border-color: #f6d98a;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.2);
      transform: translateX(-2px);
    }
    .back-btn:active {
      transform: scale(0.96);
    }
    .back-btn:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
    }

    .back-btn .back-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1a1a1a 0%, #000 100%);
      color: #fff;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover .back-icon {
      background: linear-gradient(145deg, var(--amber) 0%, #d97706 100%);
      transform: translateX(-2px);
    }
    .back-btn .back-icon svg {
      width: 15px;
      height: 15px;
      display: block;
    }
    .back-btn .back-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 0;
    }
    .back-btn .back-label {
      letter-spacing: 0.02em;
      line-height: 1;
      white-space: nowrap;
    }
    .back-btn .back-sub {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .brand-title {
      justify-self: center;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.12rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1.15;
      white-space: nowrap;
      text-align: center;
      max-width: 100%;
    }
    .brand-title em {
      font-style: normal;
      color: var(--amber);
    }
    .brand-sub {
      display: block;
      font-family: var(--font);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #92400e;
      background: linear-gradient(180deg, #fffbeb 0%, var(--amber-soft) 100%);
      border: 1px solid #fde68a;
      padding: 7px 11px;
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(245, 158, 11, 0.12);
    }
    #status .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
      flex-shrink: 0;
      animation: pulseDot 2s ease infinite;
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(0.92); }
    }

    .download-btn {
      min-height: 44px;
      min-width: 44px;
      background: linear-gradient(145deg, #1a1a1a 0%, #000 100%);
      color: #fff;
      border: none;
      padding: 0 16px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 650;
      font-size: 0.86rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      align-items: center;
      gap: 7px;
      display: inline-flex;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
      -webkit-tap-highlight-color: transparent;
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }
    .download-btn:active { transform: translateY(0); }
    .download-btn:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
    }

    .download-btn.locked {
      background: linear-gradient(180deg, #f3f4f6 0%, #e5e7eb 100%);
      color: #9ca3af;
      box-shadow: none;
      cursor: not-allowed;
    }
    .download-btn.locked:hover { transform: none; box-shadow: none; }
    .download-btn.locked svg { opacity: 0.55; }

    .watermark-overlay {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100%;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      justify-items: center;
      align-items: center;
      overflow: hidden;
      z-index: 900;
      pointer-events: none;
    }

    .wm-item {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: rgba(17, 17, 17, 0.06);
      transform: rotate(-32deg);
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.3px;
      white-space: nowrap;
      pointer-events: none;
    }

    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    .loader-container {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background:
        radial-gradient(circle at 50% 35%, var(--amber-soft), transparent 42%),
        var(--bg);
      animation: fadeBoot 0.3s ease both;
    }

    @keyframes fadeBoot {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid #eee;
      border-top-color: var(--amber);
      border-right-color: var(--ink);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .loader-container.is-error .loader-text {
      color: #b91c1c;
      font-weight: 650;
      text-align: center;
      max-width: 280px;
      padding: 0 20px;
    }

    .scroll-area {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      z-index: 10;
      pointer-events: auto;
      background:
        linear-gradient(180deg, #fafafa 0%, var(--page-bg) 100%);
      padding-bottom: var(--safe-bottom);
    }

    .pdf-viewer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      gap: 14px;
      width: calc(100% * var(--pdf-scale));
      transform-origin: top left;
      animation: pagesIn 0.45s ease both;
    }

    @keyframes pagesIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      max-width: calc(900px * var(--pdf-scale));
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(17, 17, 17, 0.06);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: 10px;
      -webkit-touch-callout: none;
      pointer-events: auto;
    }

    @media (max-width: 700px) {
      :root { --header-h: 62px; }

      .header {
        padding-left: 12px;
        padding-right: 12px;
        gap: 8px;
      }

      .brand-title { font-size: 0.95rem; }
      .brand-sub { display: none; }

      .back-btn {
        min-height: 44px;
        padding: 0 12px 0 6px;
        gap: 8px;
      }
      .back-btn .back-icon {
        width: 36px;
        height: 36px;
      }
      .back-btn .back-sub { display: none; }
      .back-btn .back-label { font-size: 0.78rem; }

      #status {
        padding: 6px 9px;
        font-size: 0.6rem;
      }
      #status .status-text { display: none; }
      #status .status-dot { width: 8px; height: 8px; }

      .download-btn {
        min-height: 44px;
        padding: 0 13px;
        font-size: 0.8rem;
        border-radius: 11px;
      }
      .download-btn svg { width: 15px; height: 15px; }
      #dl-text { display: none; }
      .download-btn::after {
        content: 'Save';
        font-weight: 650;
      }
      .download-btn.locked::after { content: 'Lock'; }

      .pdf-viewer-container {
        padding: 10px 8px calc(22px + var(--safe-bottom));
        gap: 10px;
      }

      .page-wrapper {
        border-radius: 8px;
        box-shadow: 0 3px 12px rgba(17, 17, 17, 0.05);
      }

      canvas { border-radius: 8px; }

      .wm-item { font-size: 9px; color: rgba(17, 17, 17, 0.05); }
      .watermark-overlay {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="header">
    <a href="lecture.html" class="back-btn" aria-label="Back to My Courses">
      <span class="back-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </span>
      <span class="back-text">
        <span class="back-label">My Courses</span>

      </span>
    </a>
    <div class="brand-title">
      PREM<em>ium</em> Mind
      <span class="brand-sub">Secure Reader</span>
    </div>
    <div class="header-actions">
      <div id="status" title="Protected viewing mode">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text">Secure</span>
      </div>
      <button id="downloadBtn" class="download-btn" type="button" aria-label="Download PDF">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="dl-text">Save PDF</span>
      </button>
    </div>
  </div>

  <div class="watermark-overlay" id="wmLayer">
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <p class="loader-text">Loading notes...</p>
  </div>

  <div class="scroll-area" id="scrollArea">
      <div class="pdf-viewer-container" id="pdfContainer"></div>
  </div>

  <script>
     document.addEventListener('touchmove', function(e) {
         if (e.touches && e.touches.length > 1) { e.preventDefault(); }
     }, { passive: false });

     const scrollArea = document.getElementById('scrollArea');
     const ZOOM_MIN = 1;
     const ZOOM_MAX = 4;
     let currentScale = 1;
     let pinchStartDist = 0;
     let pinchStartScale = 1;
     let pinchCenterX = 0;
     let pinchCenterY = 0;

     function applyZoom(newScale, anchorX, anchorY) {
         const prev = currentScale;
         currentScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, newScale));
         if (Math.abs(currentScale - prev) < 0.001) return;

         const ratio = currentScale / prev;
         scrollArea.scrollLeft = (scrollArea.scrollLeft + anchorX) * ratio - anchorX;
         scrollArea.scrollTop = (scrollArea.scrollTop + anchorY) * ratio - anchorY;
         document.documentElement.style.setProperty('--pdf-scale', currentScale);
     }

     scrollArea.addEventListener('touchstart', (e) => {
         if (e.touches.length === 2) {
             pinchStartDist = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             pinchStartScale = currentScale;
             const rect = scrollArea.getBoundingClientRect();
             pinchCenterX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
             pinchCenterY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
         }
     }, {passive: false});

     scrollArea.addEventListener('touchmove', (e) => {
         if (e.touches.length === 2 && pinchStartDist > 0) {
             e.preventDefault();
             const dist = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             const rect = scrollArea.getBoundingClientRect();
             pinchCenterX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
             pinchCenterY = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
             applyZoom(pinchStartScale * (dist / pinchStartDist), pinchCenterX, pinchCenterY);
         }
     }, {passive: false});

     scrollArea.addEventListener('touchend', () => {
         if (pinchStartDist > 0) {
             pinchStartDist = 0;
             if (typeof window.__reRenderZoom === 'function') window.__reRenderZoom();
         }
     }, {passive: true});

     scrollArea.addEventListener('wheel', (e) => {
         if (e.ctrlKey || e.metaKey) {
             e.preventDefault();
             const rect = scrollArea.getBoundingClientRect();
             applyZoom(currentScale + (e.deltaY > 0 ? -0.25 : 0.25), e.clientX - rect.left, e.clientY - rect.top);
             if (typeof window.__reRenderZoom === 'function') window.__reRenderZoom();
         }
     }, {passive: false});

     const userEmail = localStorage.getItem('customUserEmail') || localStorage.getItem('userEmail');

     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) { console.error("Failed to fetch phone number"); }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     window.addEventListener('blur', () => { document.body.classList.add('secure-mode'); });
     window.addEventListener('focus', () => { document.body.classList.remove('secure-mode'); });

     document.addEventListener('visibilitychange', () => {
         if (document.hidden) document.body.classList.add('secure-mode');
         else document.body.classList.remove('secure-mode');
     });

     document.addEventListener('keydown', (e) => {
         if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.metaKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.key === 'PrintScreen') {
            try { navigator.clipboard.writeText('Screenshots not allowed'); } catch (err) {}
            document.body.classList.add('secure-mode');
            setTimeout(() => document.body.classList.remove('secure-mode'), 2000);
         }
     });

     const API_BASE = 'https://premind.diplomawallah.in';
     const urlParams = new URLSearchParams(window.location.search);
     let pdfFile = urlParams.get('file');
     let legacyPdf = urlParams.get('pdf');
     let allowDownload = urlParams.get('download') === 'true' || urlParams.get('download') === '1';
     let customTitle = urlParams.get('title');

     function normalizePdfPath(raw) {
         if (!raw) return null;
         let f = String(raw).trim();
         if (!f || f === 'null' || f === 'undefined') return null;
         try { f = decodeURIComponent(f); } catch (e) {}
         f = f.replace(/\\/g, '/');
         if (/proxy_pdf\.php/i.test(f)) {
             try {
                 const u = new URL(f, API_BASE);
                 const q = u.searchParams.get('file');
                 if (q) f = q;
             } catch (e) {
                 const m = f.match(/[?&]file=([^&]+)/i);
                 if (m) { try { f = decodeURIComponent(m[1]); } catch (e2) { f = m[1]; } }
             }
         }
         if (/^https?:\/\//i.test(f)) {
             try { f = (new URL(f).pathname || '').replace(/^\/+/, ''); } catch (e) {}
         }
         f = f.replace(/^\/+/, '');
         if (f && f.indexOf('/') === -1 && /\.pdf$/i.test(f)) f = 'uploads/pdfs/' + f;
         f = f.replace(/(?:uploads\/pdfs\/)+/i, 'uploads/pdfs/');
         return f || null;
     }

     if (!pdfFile && legacyPdf) pdfFile = normalizePdfPath(legacyPdf);
     else pdfFile = normalizePdfPath(pdfFile);

     async function getPdfToken(purpose) {
         const res = await fetch(`${API_BASE}/get_pdf_token.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, purpose })
         });
         const data = await res.json().catch(() => ({}));
         if (!res.ok || data.status !== 'success' || !data.token) {
             throw new Error(data.message || 'Token request failed');
         }
         return data.token;
     }

     async function fetchSecurePdfBytes(purpose) {
         const token = await getPdfToken(purpose);
         const res = await fetch(`${API_BASE}/proxy_pdf.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, token })
         });
         if (!res.ok) throw new Error('Unauthorized Access or Invalid Token');
         return res.arrayBuffer();
     }

     function isNativeApp() {
         // Bridge present = definitely inside Android WebView app
         if (window.AndroidPdfSaver) return true;
         return !!(window.Capacitor
             && typeof window.Capacitor.isNativePlatform === 'function'
             && window.Capacitor.isNativePlatform());
     }

     async function savePdfViaAndroidBridge(buf, fileName) {
         if (!window.AndroidPdfSaver) throw new Error('AndroidPdfSaver missing — rebuild app');
         window.AndroidPdfSaver.begin(fileName);
         const bytes = new Uint8Array(buf);
         const chunkSize = 256 * 1024;
         for (let i = 0; i < bytes.length; i += chunkSize) {
             const slice = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
             let binary = '';
             for (let j = 0; j < slice.length; j++) binary += String.fromCharCode(slice[j]);
             window.AndroidPdfSaver.appendChunk(btoa(binary));
         }
         window.AndroidPdfSaver.finish();
     }

     if (pdfFile) {
         const downloadBtn = document.getElementById('downloadBtn');

         if (!allowDownload) {
             downloadBtn.classList.add('locked');
             document.getElementById('dl-text').innerText = "Locked";
             downloadBtn.setAttribute('aria-label', 'Download locked until exam day');
         }

         downloadBtn.addEventListener('click', async () => {
             if (!allowDownload) {
                 alert("⚠️ Download available day of exam at 6:00 AM only.");
                 return;
             }

             const originalHtml = downloadBtn.innerHTML;
             downloadBtn.innerHTML = "⏳ Wait...";
             downloadBtn.disabled = true;

             try {
                 const buf = await fetchSecurePdfBytes('download');

                 let baseName = "Premium_Notes";
                 if (customTitle) {
                     baseName = decodeURIComponent(customTitle).replace(/[^a-zA-Z0-9 ]/g, "_");
                 } else {
                     const extractedName = pdfFile.substring(pdfFile.lastIndexOf('/') + 1);
                     if (extractedName) baseName = extractedName.replace(/\.pdf$/i, "");
                 }
                 const fileName = `${baseName}_PREMium_Mind.pdf`;

                 if (isNativeApp()) {
                     await savePdfViaAndroidBridge(buf, fileName);
                 } else {
                     const blob = new Blob([buf], { type: 'application/pdf' });
                     const blobUrl = URL.createObjectURL(blob);
                     const a = document.createElement('a');
                     a.href = blobUrl;
                     a.download = fileName;
                     document.body.appendChild(a);
                     a.click();
                     document.body.removeChild(a);
                     URL.revokeObjectURL(blobUrl);
                 }
                 downloadBtn.innerHTML = "✅ Done";
             } catch (error) {
                 console.error(error);
                 alert("Download Failed: " + (error && error.message ? error.message : "secure layer"));
                 downloadBtn.innerHTML = "❌ Failed";
             }

             setTimeout(() => {
                 downloadBtn.innerHTML = originalHtml;
                 downloadBtn.disabled = false;
             }, 2000);
         });
     }

     if (pdfFile) {
         const container = document.getElementById('pdfContainer');
         const loadingState = document.getElementById('loadingState');
         const loaderText = loadingState.querySelector('.loader-text');

         fetchSecurePdfBytes('view')
         .then(async (pdfData) => {
             pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

             const pdfDoc = await pdfjsLib.getDocument({ data: pdfData }).promise;
             pdfData = null;

             const isMobile = window.innerWidth < 700 || /Android|iPhone|iPad/i.test(navigator.userAgent);
             const dpr = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 1.5);
             const MAX_EDGE = isMobile ? 4200 : 5200;

             const firstPage = await pdfDoc.getPage(1);
             const baseVp = firstPage.getViewport({ scale: 1 });
             const pad = isMobile ? 16 : 36;
             const cssWidth = Math.min(900, Math.max(280, scrollArea.clientWidth - pad));
             const fitScale = cssWidth / baseVp.width;

             const entries = [];

             async function renderEntry(entry, renderScale) {
                 const viewport = entry.page.getViewport({ scale: renderScale });
                 let pr = dpr;
                 const longEdge = Math.max(viewport.width, viewport.height) * pr;
                 if (longEdge > MAX_EDGE) pr = MAX_EDGE / Math.max(viewport.width, viewport.height);

                 const canvas = document.createElement('canvas');
                 canvas.oncontextmenu = () => false;
                 const ctx = canvas.getContext('2d', { alpha: false });
                 canvas.width = Math.floor(viewport.width * pr);
                 canvas.height = Math.floor(viewport.height * pr);
                 canvas.style.width = '100%';
                 canvas.style.height = 'auto';

                 const transform = pr !== 1 ? [pr, 0, 0, pr, 0, 0] : null;
                 await entry.page.render({ canvasContext: ctx, transform, viewport }).promise;

                 entry.wrapper.innerHTML = '';
                 entry.wrapper.appendChild(canvas);
                 entry.renderedScale = renderScale;
             }

             for (let num = 1; num <= pdfDoc.numPages; num++) {
                 if (loaderText) loaderText.textContent = 'Loading ' + num + '/' + pdfDoc.numPages + '...';
                 const page = await pdfDoc.getPage(num);
                 const wrapper = document.createElement('div');
                 wrapper.className = 'page-wrapper';
                 container.appendChild(wrapper);
                 const entry = { page, wrapper, renderedScale: 0 };
                 entries.push(entry);
                 await renderEntry(entry, fitScale);
             }

             loadingState.style.display = 'none';

             let zoomTimer = null;
             let zoomBusy = false;
             window.__reRenderZoom = function () {
                 clearTimeout(zoomTimer);
                 zoomTimer = setTimeout(async () => {
                     if (zoomBusy) return;
                     zoomBusy = true;
                     try {
                         const target = fitScale * currentScale;
                         const rootRect = scrollArea.getBoundingClientRect();
                         for (const entry of entries) {
                             const r = entry.wrapper.getBoundingClientRect();
                             const visible = r.bottom >= rootRect.top - 60 && r.top <= rootRect.bottom + 60;
                             if (visible) {
                                 if (Math.abs(entry.renderedScale - target) > 0.05) await renderEntry(entry, target);
                             } else if (entry.renderedScale > fitScale + 0.05) {
                                 await renderEntry(entry, fitScale);
                             }
                         }
                     } finally {
                         zoomBusy = false;
                     }
                 }, 220);
             };

             scrollArea.addEventListener('scroll', () => {
                 if (currentScale > 1.05) window.__reRenderZoom();
             }, { passive: true });
         })
         .catch(err => {
             loadingState.classList.add('is-error');
             loadingState.innerHTML = "<p class='loader-text'>Access Denied. Secure Connection Failed.</p>";
             console.error(err);
         });
     } else {
         const loadingState = document.getElementById('loadingState');
         loadingState.classList.add('is-error');
         loadingState.innerHTML = "<p class='loader-text'>No PDF file provided.</p>";
     }
  </script>
</body>
</html>
