<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  
  <style>
    /* Security: Prevent Printing */
    @media print {
        html, body { display: none !important; visibility: hidden !important; }
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Poppins', sans-serif;
      background: #e5e7eb; 
      /* Native scroll allow karne ke liye body ko handle karne de rahe hain */
      user-select: none; 
      -webkit-user-select: none;
      transition: filter 0.2s ease;
    }
    
    /* Header */
    .header {
      background: #111; color: #fff;
      padding: 0 20px; display: flex; align-items: center; justify-content: space-between;
      height: 60px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 100; position: fixed; top: 0; width: 100%; box-sizing: border-box;
    }
    
    .back-btn {
      color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem;
      display: flex; align-items: center; gap: 8px; background: #333;
      padding: 8px 15px; border-radius: 8px; transition: background 0.3s;
    }
    .back-btn:hover { background: #555; }
    
    .header-actions { display: flex; gap: 10px; align-items: center; }
    
    #downloadBtn {
      display: none; 
      background: #10b981; color: white; border: none; font-family: 'Poppins';
      font-weight: 600; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s;
    }
    #downloadBtn:hover { background: #059669; }
    
    .brand-name { font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; color: #10b981; display:none;}

    /* PDF Viewer Area */
    .pdf-viewer-container {
      width: 100%; 
      display: flex; flex-direction: column; align-items: center; 
      padding: 80px 10px 30px 10px; /* Header ke niche se shuru karne ke liye padding-top 80px */
      box-sizing: border-box;
      gap: 20px;
    }

    .page-wrapper {
      width: 100%; display: flex; justify-content: center;
    }

    canvas {
      background: #ffffff; 
      border-radius: 4px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15); 
      /* Mobile screen par fit karne ke liye */
      width: 100% !important;
      max-width: 900px;
      height: auto !important;
      display: block;
    }
    
    /* Loading Screen */
    .loader-container {
      position: fixed; inset: 0; background: #e5e7eb; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 50;
    }
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%;
      width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .drive-iframe { width: 100%; height: calc(100vh - 60px); border: none; display: none; margin-top: 60px; }

    /* Security Overlay Message */
    #securityOverlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
        z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
    }

    @media (min-width: 768px) {
        .brand-name { display: block; }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div id="securityOverlay">
      <h2 style="color: #ef4444; margin-bottom: 10px;">⚠️ Security Alert</h2>
      <p>Screenshots, screen recording, and exiting the window are protected to secure the content.</p>
  </div>

  <div class="header">
    <a href="lecture.html" class="back-btn">← Back</a>
    <div class="brand-name">PREMium Mind</div>
    <div class="header-actions">
        <button id="downloadBtn" onclick="downloadPDF()">Download ⬇️</button>
    </div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <div style="color: #666; font-weight: 600;" id="loadingText">Opening HD Document...</div>
  </div>

  <div class="pdf-viewer-container" id="pdfContainer">
      </div>

  <iframe class="drive-iframe" id="driveContainer" allow="autoplay"></iframe>

  <script>
     // ==========================================
     // SECURITY & ANTI-PIRACY LOGIC
     // ==========================================
     document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u' || e.key === 'i')) {
            e.preventDefault();
            alert('Security Alert: This action is disabled.');
        }
        if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText('');
            alert("Screenshots are protected!");
        }
     });

     window.addEventListener('blur', function() {
         document.body.style.filter = 'blur(20px)';
         document.getElementById('securityOverlay').style.display = 'flex';
     });
     
     window.addEventListener('focus', function() {
         document.body.style.filter = 'none';
         document.getElementById('securityOverlay').style.display = 'none';
     });

     // ==========================================
     // URL PARAMS & DOWNLOAD LOGIC
     // ==========================================
     const urlParams = new URLSearchParams(window.location.search);
     let pdfUrl = urlParams.get('pdf');
     const allowDownload = urlParams.get('dl');

     if(allowDownload === '1') {
         document.getElementById('downloadBtn').style.display = 'block';
     }

     function downloadPDF() {
         if(pdfUrl) {
             const link = document.createElement('a');
             link.href = pdfUrl;
             link.download = 'PREMium_Mind_Document.pdf';
             document.body.appendChild(link);
             link.click();
             document.body.removeChild(link);
         }
     }

     // ==========================================
     // HD PDF RENDER LOGIC (MOBILE OPTIMIZED)
     // ==========================================
     if(pdfUrl) {
         if(pdfUrl.includes('drive.google.com')) {
             document.getElementById('pdfContainer').style.display = 'none';
             document.getElementById('loadingState').style.display = 'none';
             
             let driveUrl = pdfUrl;
             if(driveUrl.includes('/view')) {
                 driveUrl = driveUrl.replace(/\/view.*/, '/preview');
             }
             const iframe = document.getElementById('driveContainer');
             iframe.src = driveUrl;
             iframe.style.display = 'block';

         } else {
             pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

             // High scale for HD rendering
             const scale = 2.0; 
             const container = document.getElementById('pdfContainer');
             const loadingTask = pdfjsLib.getDocument({url: pdfUrl});
             
             loadingTask.promise.then(async (pdfDoc) => {
                 document.getElementById('loadingText').innerText = "Rendering Pages...";
                 const totalPages = pdfDoc.numPages;

                 for (let num = 1; num <= totalPages; num++) {
                     await renderPageHD(pdfDoc, num, scale, container);
                 }

                 document.getElementById('loadingState').style.opacity = '0';
                 setTimeout(() => {
                     document.getElementById('loadingState').style.display = 'none';
                 }, 300);

             }).catch(err => {
                 console.error("PDF Load Error:", err);
                 document.getElementById('loadingState').innerHTML = `<h3 style="color:#dc2626;">File Load Error</h3><p style="font-size:12px; color:#666;">Document could not be loaded.</p>`;
             });
         }
     } else {
         document.getElementById('loadingState').innerHTML = `<h3 style="color:red;">Error: Document Missing!</h3>`;
     }

     async function renderPageHD(pdfDoc, num, scale, container) {
         const page = await pdfDoc.getPage(num);
         const viewport = page.getViewport({ scale });

         const wrapper = document.createElement('div');
         wrapper.className = 'page-wrapper';
         
         const canvas = document.createElement('canvas');
         const ctx = canvas.getContext('2d');

         // Physical HD Pixels based on device screen
         const outputScale = window.devicePixelRatio || 1;
         canvas.width = Math.floor(viewport.width * outputScale);
         canvas.height = Math.floor(viewport.height * outputScale);
         
         // CSS Logic for native zoom support
         // Width 100% rakhi hai taaki screen par fit ho aur finger se zoom ho sake
         canvas.style.maxWidth = Math.floor(viewport.width) + "px";

         const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

         wrapper.appendChild(canvas);
         container.appendChild(wrapper);

         const renderCtx = { 
             canvasContext: ctx, 
             transform: transform, 
             viewport: viewport 
         };
         await page.render(renderCtx).promise;
     }
  </script>

</body>
</html>
