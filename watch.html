<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  
  <style>
    :root {
      --pdf-scale: 1;
    }

    /* Security: Print Block */
    @media print { html, body { display: none !important; } }

    /* Body ko pura block kar diya taaki background bilkul na hile */
    body {
      margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
      background: #e5e7eb; user-select: none; -webkit-user-select: none;
      transition: filter 0.3s ease;
      overflow: hidden; 
      touch-action: none; /* Native gestures global block */
    }
    
    /* 🛡️ 100% STATIC HEADER (Rock Solid & Modern) 🛡️ */
    .header {
      background: #111827; color: #fff; padding: 0 15px; 
      display: flex; align-items: center; justify-content: space-between;
      height: 65px; width: 100%; box-sizing: border-box;
      position: absolute; top: 0; left: 0; z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      pointer-events: auto;
    }
    
    .back-btn {
      color: #fff; text-decoration: none; font-weight: 500; font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1); padding: 8px 14px; border-radius: 50px;
      display: flex; align-items: center; gap: 5px; transition: 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

    .brand-title {
      font-weight: 700; color: #10b981; font-size: 1rem;
      letter-spacing: 0.5px; display: flex; align-items: center; gap: 5px;
    }

    /* 🟢 DOWNLOAD BUTTON STYLES 🟢 */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .download-btn {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
      transition: all 0.3s ease;
      align-items: center;
      gap: 6px;
      display: flex; /* 🔥 Isko show karne ke liye block kiya 🔥 */
    }
    .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.4); }
    .download-btn:active { transform: translateY(0); }

    /* Agar download off ho toh thoda gray/lock type feel dene ke liye class */
    .download-btn.locked {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    #status {
      background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px; color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* 🛡️ STATIC WATERMARK (Never Moves) 🛡️ */
    .watermark-overlay {
      position: absolute; top: 65px; left: 0; width: 100%; height: calc(100vh - 65px);
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr);
      justify-items: center; align-items: center; 
      overflow: hidden; z-index: 900; pointer-events: none;
    }
    
    .wm-item {
      font-size: 12px; font-weight: 600; 
      color: rgba(0, 0, 0, 0.08); 
      transform: rotate(-35deg); text-align: center;
      line-height: 1.4; letter-spacing: 0.8px; white-space: nowrap;
      text-shadow: 1px 1px 1px rgba(255,255,255,0.1);
    }

    .loader-container {
      position: fixed; inset: 0; background: #e5e7eb; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 2000;
    }
    .loader { border: 4px solid #d1d5db; border-top: 4px solid #10b981; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 📄 PDF SCROLL AREA 📄 */
    .scroll-area {
      position: absolute; top: 65px; left: 0;
      width: 100vw; height: calc(100vh - 65px);
      overflow: auto; /* Allows native scrolling */
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y; /* Allow scroll but block pinch-zoom natively */
      z-index: 10;
      pointer-events: auto;
    }

    .pdf-viewer-container {
      display: flex; flex-direction: column; align-items: center; 
      padding: 15px; box-sizing: border-box; gap: 15px;
      width: calc(100% * var(--pdf-scale)); 
      transform-origin: top left;
    }

    .page-wrapper { 
      position: relative; width: 100%; display: flex; justify-content: center; 
      max-width: 900px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    canvas {
      width: 100% !important; height: auto !important;
      display: block; border-radius: 8px;
    }

    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    /* Mobile Optimizations */
    @media (max-width: 600px) {
       .wm-item { font-size: 10px; color: rgba(0,0,0,0.06); }
       .watermark-overlay { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(5, 1fr); }
       
       .header { padding: 0 12px; height: 60px; }
       .scroll-area { top: 60px; height: calc(100vh - 60px); }
       .watermark-overlay { top: 60px; height: calc(100vh - 60px); }
       
       .brand-title { display: none; } /* Hide title on very small screens to save space */
       .back-btn span { display: none; } /* Hide "Back" text, show only icon */
       .back-btn { padding: 8px 12px; }
       .download-btn { padding: 8px 14px; font-size: 0.8rem; }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="header">
    <a href="lecture.html" class="back-btn" onclick="window.history.back(); return false;">
      <span>←</span> <span>Back</span>
    </a>
    <div class="brand-title">PREMium Mind</div>
    
    <div class="header-actions">
      <div id="status">SECURE HD</div>
      <button id="downloadBtn" class="download-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="dl-text">Save</span>
      </button>
    </div>
  </div>

  <div class="watermark-overlay" id="wmLayer">
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <p style="margin-top:15px; color:#4b5563; font-weight: 500;">Loading Secure PDF...</p>
  </div>

  <div class="scroll-area" id="scrollArea">
      <div class="pdf-viewer-container" id="pdfContainer"></div>
  </div>

  <script>
     // =========================================================
     // 1. GLOBAL NATIVE ZOOM BLOCKER
     // =========================================================
     document.addEventListener('touchmove', function(e) {
         if (e.touches && e.touches.length > 1) {
             e.preventDefault();
         }
     }, { passive: false });

     // =========================================================
     // 2. CUSTOM PINCH-TO-ZOOM FOR PDF ONLY
     // =========================================================
     const scrollArea = document.getElementById('scrollArea');
     
     let currentScale = 1;
     let initialDistance = 0;
     let initialScale = 1;

     scrollArea.addEventListener('touchstart', (e) => {
         if (e.touches.length === 2) {
             initialDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             initialScale = currentScale;
         }
     }, {passive: false});

     scrollArea.addEventListener('touchmove', (e) => {
         if (e.touches.length === 2) {
             e.preventDefault(); 
             const currentDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             
             currentScale = initialScale * (currentDistance / initialDistance);
             currentScale = Math.max(1, Math.min(currentScale, 3.5));
             
             document.documentElement.style.setProperty('--pdf-scale', currentScale);
         }
     }, {passive: false});

     // =========================================================
     // 3. FETCH PHONE & SET WATERMARK
     // =========================================================
     const userEmail = localStorage.getItem('customUserEmail');
     
     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) {
             console.error("Failed to fetch phone number");
         }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     // =========================================================
     // 4. SECURITY: ANTI-SCREENSHOT & BLUR
     // =========================================================
     window.addEventListener('blur', () => { document.body.classList.add('secure-mode'); });
     window.addEventListener('focus', () => { document.body.classList.remove('secure-mode'); });

     document.addEventListener('keydown', (e) => {
         if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText('Screenshots not allowed');
            document.body.classList.add('secure-mode');
            setTimeout(() => document.body.classList.remove('secure-mode'), 2000);
         }
     });

     // =========================================================
     // 5. PDF INITIALIZATION & BRANDED DOWNLOAD LOGIC (UPDATED)
     // =========================================================
     const urlParams = new URLSearchParams(window.location.search);
     let pdfUrl = urlParams.get('pdf');
     let allowDownload = urlParams.get('download') === 'true' || urlParams.get('download') === '1'; 
     let customTitle = urlParams.get('title');

     if (pdfUrl) {
         const downloadBtn = document.getElementById('downloadBtn');
         
         // Agar access nahi hai, toh lock wala look de do
         if(!allowDownload) {
             downloadBtn.classList.add('locked');
             document.getElementById('dl-text').innerText = "Locked";
         }
         
         downloadBtn.addEventListener('click', async () => {
             // 🔥 AGAR ALLOW NAHI HAI TOH MESSAGE DIKHAO AUR ROK DO 🔥
             if(!allowDownload) {
                 alert("⚠️ Download available one day before exam at 2:00 PM only.");
                 return; // Yahan se code aage nahi jayega
             }

             const originalHtml = downloadBtn.innerHTML;
             downloadBtn.innerHTML = "⏳ Wait...";
             downloadBtn.disabled = true;

             try {
                 const response = await fetch(pdfUrl);
                 const blob = await response.blob();
                 const blobUrl = window.URL.createObjectURL(blob);
                 
                 let baseName = "Premium_Notes"; 

                 if (customTitle) {
                     baseName = decodeURIComponent(customTitle).replace(/[^a-zA-Z0-9 ]/g, "_");
                 } else {
                     let extractedName = "";
                     if (pdfUrl.includes('proxy_pdf.php?file=')) {
                         let realPath = decodeURIComponent(pdfUrl.split('file=')[1]);
                         extractedName = realPath.substring(realPath.lastIndexOf('/') + 1).split('?')[0];
                     } else {
                         extractedName = pdfUrl.substring(pdfUrl.lastIndexOf('/') + 1).split('?')[0];
                     }

                     if (extractedName.toLowerCase().endsWith('.pdf')) {
                         extractedName = extractedName.substring(0, extractedName.length - 4);
                     }
                     
                     if (extractedName && !extractedName.includes('.php')) {
                         baseName = extractedName;
                     }
                 }
                 
                 let finalFileName = `${baseName}_PREMium_Mind.pdf`;
                 
                 const a = document.createElement('a');
                 a.href = blobUrl;
                 a.download = finalFileName;
                 
                 document.body.appendChild(a);
                 a.click();
                 document.body.removeChild(a);
                 
                 window.URL.revokeObjectURL(blobUrl);
                 
                 downloadBtn.innerHTML = "✅ Done";
             } catch (error) {
                 window.open(pdfUrl, '_blank');
                 downloadBtn.innerHTML = "✅ Opened";
             }
             
             setTimeout(() => {
                 downloadBtn.innerHTML = originalHtml;
                 downloadBtn.disabled = false;
             }, 2000);
         });
     }

     // =========================================================
     // 6. RENDER HD PDF
     // =========================================================
     if(pdfUrl) {
         pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
         const container = document.getElementById('pdfContainer');

         pdfjsLib.getDocument({url: pdfUrl}).promise.then(async (pdfDoc) => {
             for (let num = 1; num <= pdfDoc.numPages; num++) {
                 const page = await pdfDoc.getPage(num);
                 const scale = 2.0; 
                 const viewport = page.getViewport({ scale });
                 
                 const wrapper = document.createElement('div');
                 wrapper.className = 'page-wrapper';
                 
                 const canvas = document.createElement('canvas');
                 const ctx = canvas.getContext('2d', { alpha: false }); 
                 const dpr = window.devicePixelRatio || 1;

                 canvas.width = Math.floor(viewport.width * dpr);
                 canvas.height = Math.floor(viewport.height * dpr);

                 const transform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;
                 wrapper.appendChild(canvas);
                 container.appendChild(wrapper);

                 await page.render({ canvasContext: ctx, transform: transform, viewport: viewport }).promise;
             }
             document.getElementById('loadingState').style.display = 'none';
         }).catch(err => {
             document.getElementById('loadingState').innerHTML = "Failed to load Document. Check if link is valid.";
         });
     } else {
         document.getElementById('loadingState').innerHTML = "No PDF URL Provided.";
     }
  </script>
</body>
</html>
