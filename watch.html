<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    :root {
      --pdf-scale: 1;
      --ink: #111111;
      --muted: #6b7280;
      --line: #ececec;
      --amber: #f59e0b;
      --amber-soft: #fff7e6;
      --bg: #ffffff;
      --page-bg: #f7f7f8;
      --header-h: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: 'Outfit', system-ui, sans-serif;
      --display: 'Fraunces', Georgia, serif;
    }

    @media print { html, body { display: none !important; } }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      color: var(--ink);
      background: var(--page-bg);
      user-select: none;
      -webkit-user-select: none;
      transition: filter 0.3s ease;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header {
      position: absolute;
      top: 0; left: 0;
      z-index: 1000;
      width: 100%;
      height: calc(var(--header-h) + var(--safe-top));
      padding: var(--safe-top) 14px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8), 0 8px 24px rgba(17, 17, 17, 0.04);
      pointer-events: auto;
      animation: headerIn 0.4s ease both;
    }

    @keyframes headerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      justify-self: start;
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      min-height: 42px;
      padding: 0 14px 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e8e8ea;
      box-shadow: 0 1px 2px rgba(17, 17, 17, 0.04), 0 4px 12px rgba(17, 17, 17, 0.04);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover {
      background: var(--amber-soft);
      border-color: #f6d98a;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.18);
      transform: translateX(-1px);
    }
    .back-btn:active {
      transform: scale(0.97);
    }

    .back-btn .back-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover .back-icon {
      background: var(--amber);
      transform: translateX(-1px);
    }
    .back-btn .back-icon svg {
      width: 14px;
      height: 14px;
      display: block;
    }
    .back-btn .back-label {
      letter-spacing: 0.01em;
      padding-right: 2px;
    }

    .brand-title {
      justify-self: center;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }
    .brand-title em {
      font-style: normal;
      color: var(--amber);
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #92400e;
      background: var(--amber-soft);
      border: 1px solid #fde68a;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .download-btn {
      min-height: 40px;
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 0 14px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 650;
      font-size: 0.88rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      align-items: center;
      gap: 6px;
      display: inline-flex;
    }
    .download-btn:hover {
      background: #000;
      transform: translateY(-1px);
    }
    .download-btn:active { transform: translateY(0); }

    .download-btn.locked {
      background: #e5e7eb;
      color: #9ca3af;
    }
    .download-btn.locked:hover { transform: none; background: #e5e7eb; }

    .watermark-overlay {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100%;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      justify-items: center;
      align-items: center;
      overflow: hidden;
      z-index: 900;
      pointer-events: none;
    }

    .wm-item {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: rgba(17, 17, 17, 0.06);
      transform: rotate(-32deg);
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .loader-container {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background:
        radial-gradient(circle at 50% 35%, var(--amber-soft), transparent 42%),
        var(--bg);
      animation: fadeBoot 0.3s ease both;
    }

    @keyframes fadeBoot {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid #eee;
      border-top-color: var(--amber);
      border-right-color: var(--ink);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .loader-container.is-error .loader-text {
      color: #b91c1c;
      font-weight: 650;
      text-align: center;
      max-width: 280px;
      padding: 0 20px;
    }

    .scroll-area {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      z-index: 10;
      pointer-events: auto;
      background:
        linear-gradient(180deg, #fafafa 0%, var(--page-bg) 100%);
      padding-bottom: var(--safe-bottom);
    }

    .pdf-viewer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      gap: 14px;
      width: calc(100% * var(--pdf-scale));
      transform-origin: top left;
      animation: pagesIn 0.45s ease both;
    }

    @keyframes pagesIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      max-width: 900px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(17, 17, 17, 0.06);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: 10px;
    }

    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    @media (max-width: 700px) {
      :root { --header-h: 58px; }

      .header {
        padding-left: 10px;
        padding-right: 10px;
        gap: 6px;
      }

      .brand-title {
        font-size: 1rem;
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .back-btn {
        min-height: 40px;
        min-width: 40px;
        padding: 0;
        justify-content: center;
        gap: 0;
        border-radius: 50%;
      }
      .back-btn .back-label { display: none; }
      .back-btn .back-icon {
        width: 40px;
        height: 40px;
        background: #111;
      }
      .back-btn:hover .back-icon { background: var(--amber); }

      #status { display: none; }

      .download-btn {
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.82rem;
      }
      .download-btn svg { width: 15px; height: 15px; }

      .pdf-viewer-container {
        padding: 10px 8px calc(22px + var(--safe-bottom));
        gap: 10px;
      }

      .page-wrapper {
        border-radius: 8px;
        box-shadow: 0 3px 12px rgba(17, 17, 17, 0.05);
      }

      canvas { border-radius: 8px; }

      .wm-item { font-size: 9px; color: rgba(17, 17, 17, 0.05); }
      .watermark-overlay {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="header">
    <a href="lecture.html" class="back-btn" onclick="window.history.back(); return false;" aria-label="Go back">
      <span class="back-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </span>
      <span class="back-label">Back</span>
    </a>
    <div class="brand-title">PREM<em>ium</em> Mind</div>
    <div class="header-actions">
      <div id="status">Secure</div>
      <button id="downloadBtn" class="download-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="dl-text">Save</span>
      </button>
    </div>
  </div>

  <div class="watermark-overlay" id="wmLayer">
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <p class="loader-text">Loading notes...</p>
  </div>

  <div class="scroll-area" id="scrollArea">
      <div class="pdf-viewer-container" id="pdfContainer"></div>
  </div>

  <script>
     // =========================================================
     // 1. GLOBAL NATIVE ZOOM BLOCKER
     // =========================================================
     document.addEventListener('touchmove', function(e) {
         if (e.touches && e.touches.length > 1) { e.preventDefault(); }
     }, { passive: false });

     // =========================================================
     // 2. CUSTOM PINCH-TO-ZOOM FOR PDF ONLY
     // =========================================================
     const scrollArea = document.getElementById('scrollArea');
     let currentScale = 1, initialDistance = 0, initialScale = 1;

     scrollArea.addEventListener('touchstart', (e) => {
         if (e.touches.length === 2) {
             initialDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             initialScale = currentScale;
         }
     }, {passive: false});

     scrollArea.addEventListener('touchmove', (e) => {
         if (e.touches.length === 2) {
             e.preventDefault(); 
             const currentDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             currentScale = initialScale * (currentDistance / initialDistance);
             currentScale = Math.max(1, Math.min(currentScale, 3.5));
             document.documentElement.style.setProperty('--pdf-scale', currentScale);
         }
     }, {passive: false});

     // =========================================================
     // 3. FETCH PHONE & SET WATERMARK
     // =========================================================
     const userEmail = localStorage.getItem('customUserEmail') || localStorage.getItem('userEmail');
     
     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) { console.error("Failed to fetch phone number"); }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     // =========================================================
     // 4. SECURITY: ANTI-SCREENSHOT & BLUR
     // =========================================================
     window.addEventListener('blur', () => { document.body.classList.add('secure-mode'); });
     window.addEventListener('focus', () => { document.body.classList.remove('secure-mode'); });

     document.addEventListener('keydown', (e) => {
         if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText('Screenshots not allowed');
            document.body.classList.add('secure-mode');
            setTimeout(() => document.body.classList.remove('secure-mode'), 2000);
         }
     });

     // =========================================================
     // 5. PDF SECURE FETCH (short-lived one-time tokens — no secret in JS)
     // =========================================================
     const API_BASE = 'https://premind.diplomawallah.in';
     const urlParams = new URLSearchParams(window.location.search);
     let pdfFile = urlParams.get('file');
     let legacyPdf = urlParams.get('pdf');
     let allowDownload = urlParams.get('download') === 'true' || urlParams.get('download') === '1';
     let customTitle = urlParams.get('title');

     function normalizePdfPath(raw) {
         if (!raw) return null;
         let f = String(raw).trim();
         try { f = decodeURIComponent(f); } catch (e) {}
         f = f.replace(/\\/g, '/');

         // Full proxy URL → extract file=
         if (/proxy_pdf\.php/i.test(f)) {
             try {
                 const u = new URL(f, API_BASE);
                 const q = u.searchParams.get('file');
                 if (q) f = q;
             } catch (e) {
                 const m = f.match(/[?&]file=([^&]+)/i);
                 if (m) {
                     try { f = decodeURIComponent(m[1]); } catch (e2) { f = m[1]; }
                 }
             }
         }

         // Absolute URL → path only
         if (/^https?:\/\//i.test(f)) {
             try {
                 const u = new URL(f);
                 f = (u.pathname || '').replace(/^\/+/, '');
             } catch (e) {}
         }

         f = f.replace(/^\/+/, '');

         // Filename only → assume uploads/pdfs/
         if (f && f.indexOf('/') === -1 && /\.pdf$/i.test(f)) {
             f = 'uploads/pdfs/' + f;
         }

         f = f.replace(/(?:uploads\/pdfs\/)+/i, 'uploads/pdfs/');
         return f || null;
     }

     if (!pdfFile && legacyPdf) {
         pdfFile = normalizePdfPath(legacyPdf);
     } else {
         pdfFile = normalizePdfPath(pdfFile);
     }

     async function getPdfToken(purpose) {
         const res = await fetch(`${API_BASE}/get_pdf_token.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, purpose })
         });
         const data = await res.json().catch(() => ({}));
         if (!res.ok || data.status !== 'success' || !data.token) {
             throw new Error(data.message || ('Token failed (' + res.status + ')'));
         }
         // Server may normalize path — keep in sync for proxy call
         if (data.file) pdfFile = data.file;
         return data.token;
     }

     async function fetchSecurePdfBytes(purpose) {
         const token = await getPdfToken(purpose);
         const res = await fetch(`${API_BASE}/proxy_pdf.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail, token })
         });
         if (!res.ok) {
             const msg = await res.text().catch(() => '');
             throw new Error(msg || ('PDF fetch failed (' + res.status + ')'));
         }
         return await res.arrayBuffer();
     }

     if (pdfFile) {
         const downloadBtn = document.getElementById('downloadBtn');

         if (!allowDownload) {
             downloadBtn.classList.add('locked');
             document.getElementById('dl-text').innerText = "Locked";
         }

         downloadBtn.addEventListener('click', async () => {
             if (!allowDownload) {
                 alert("⚠️ Download available day of exam at 6:00 AM only.");
                 return;
             }

             const originalHtml = downloadBtn.innerHTML;
             downloadBtn.innerHTML = "⏳ Wait...";
             downloadBtn.disabled = true;

             try {
                 const buf = await fetchSecurePdfBytes('download');
                 const blob = new Blob([buf], { type: 'application/pdf' });
                 const blobUrl = URL.createObjectURL(blob);

                 let baseName = "Premium_Notes";
                 if (customTitle) {
                     baseName = decodeURIComponent(customTitle).replace(/[^a-zA-Z0-9 ]/g, "_");
                 } else {
                     const extractedName = pdfFile.substring(pdfFile.lastIndexOf('/') + 1);
                     if (extractedName) baseName = extractedName.replace(/\.pdf$/i, "");
                 }

                 const a = document.createElement('a');
                 a.href = blobUrl;
                 a.download = `${baseName}_PREMium_Mind.pdf`;
                 document.body.appendChild(a);
                 a.click();
                 document.body.removeChild(a);
                 URL.revokeObjectURL(blobUrl);
                 downloadBtn.innerHTML = "✅ Done";
             } catch (error) {
                 console.error(error);
                 alert("Download Failed: " + (error.message || "Connection secure layer active."));
                 downloadBtn.innerHTML = "❌ Failed";
             }

             setTimeout(() => {
                 downloadBtn.innerHTML = originalHtml;
                 downloadBtn.disabled = false;
             }, 2000);
         });
     }

     // =========================================================
     // 6. RENDER HD PDF
     // =========================================================
     if (pdfFile) {
         const container = document.getElementById('pdfContainer');
         const loadingState = document.getElementById('loadingState');

         fetchSecurePdfBytes('view')
         .then(async (pdfData) => {
             pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

             // Copy bytes — pdf.js may transfer/detach the ArrayBuffer
             const bytes = new Uint8Array(pdfData);
             const pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;

             for (let num = 1; num <= pdfDoc.numPages; num++) {
                 const page = await pdfDoc.getPage(num);
                 const scale = 2.0;
                 const viewport = page.getViewport({ scale });

                 const wrapper = document.createElement('div');
                 wrapper.className = 'page-wrapper';

                 const canvas = document.createElement('canvas');
                 const ctx = canvas.getContext('2d', { alpha: false });
                 const dpr = window.devicePixelRatio || 1;

                 canvas.width = Math.floor(viewport.width * dpr);
                 canvas.height = Math.floor(viewport.height * dpr);

                 const transform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;
                 wrapper.appendChild(canvas);
                 container.appendChild(wrapper);

                 await page.render({ canvasContext: ctx, transform: transform, viewport: viewport }).promise;
             }

             loadingState.style.display = 'none';
         })
         .catch(err => {
             console.error(err);
             loadingState.classList.add('is-error');
             const tip = (err && err.message) ? String(err.message).slice(0, 120) : 'Secure Connection Failed';
             loadingState.innerHTML = "<p class='loader-text'>PDF open nahi hua.<br><span style='font-weight:500;font-size:0.85rem;opacity:.85'>" + tip + "</span></p>";
         });
     } else {
         const loadingState = document.getElementById('loadingState');
         loadingState.classList.add('is-error');
         loadingState.innerHTML = "<p class='loader-text'>No PDF file provided.</p>";
     }
  </script>
</body>
</html>
