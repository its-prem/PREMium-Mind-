<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  
  <style>
    /* Security: Print Block */
    @media print { html, body { display: none !important; } }

    body {
      margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
      background: #e5e7eb; user-select: none; -webkit-user-select: none;
      transition: filter 0.3s ease;
    }
    
    /* 🛡️ STATIC UI WRAPPER 🛡️ 
       Yeh wrapper Header aur Watermark ko screen par humesha fix rakhega 
       chahe PDF kitna bhi zoom kyu na ho jaye */
    #fixedUI {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none; /* Clicks ko PDF tak jaane dega */
      z-index: 1000;
      transform-origin: top left;
      overflow: hidden;
    }

    /* Header Styling */
    .header {
      background: #111; color: #fff; padding: 0 20px; 
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; width: 100%; box-sizing: border-box;
      position: absolute; top: 0; left: 0;
      pointer-events: auto; /* Back button click hone dega */
    }
    
    .back-btn {
      color: #fff; text-decoration: none; font-weight: 600; font-size: 0.9rem;
      background: #333; padding: 8px 15px; border-radius: 8px;
    }

    /* Minimal & Smooth Watermark Grid */
    .watermark-overlay {
      position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px);
      display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr);
      justify-items: center; align-items: center; 
    }
    
    .wm-item {
      font-size: 12px; font-weight: 600; 
      color: rgba(0, 0, 0, 0.08); /* 8% Opacity - Very transparent */
      transform: rotate(-35deg); text-align: center;
      line-height: 1.4; letter-spacing: 0.8px; white-space: nowrap;
      text-shadow: 1px 1px 1px rgba(255,255,255,0.1);
    }

    /* Loader Styling */
    .loader-container {
      position: fixed; inset: 0; background: #e5e7eb; display: flex; flex-direction: column;
      align-items: center; justify-content: center; pointer-events: auto; z-index: 2000;
    }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* PDF Rendering Area */
    .pdf-viewer-container {
      width: 100%; display: flex; flex-direction: column; align-items: center; 
      padding: 80px 10px 30px 10px; box-sizing: border-box; gap: 20px;
    }
    .page-wrapper { position: relative; width: 100%; display: flex; justify-content: center; }
    canvas {
      background: #fff; border-radius: 4px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
      width: 100% !important; max-width: 900px; height: auto !important;
    }

    /* Security: Blur on focus lost */
    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    @media (max-width: 768px) {
       .wm-item { font-size: 10px; color: rgba(0,0,0,0.06); }
       .watermark-overlay { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(5, 1fr); }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div id="fixedUI">
      <div class="header">
        <a href="lecture.html" class="back-btn">← Back</a>
        <div style="font-weight:700; color:#10b981;">PREMium Mind</div>
        <div id="status" style="font-size: 10px; opacity: 0.5;">SECURE HD</div>
      </div>

      <div class="watermark-overlay" id="wmLayer">
          <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
          <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
          <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
          <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      </div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <p style="margin-top:10px; color:#666;">Verifying Security & Loading...</p>
  </div>

  <div class="pdf-viewer-container" id="pdfContainer"></div>

  <script>
     // =========================================================
     // 1. ANTI-ZOOM LOCK (Keeps Watermark Static during Pinch Zoom)
     // =========================================================
     if (window.visualViewport) {
         const fixedUI = document.getElementById('fixedUI');
         function lockUI() {
             const vv = window.visualViewport;
             // Browser jitna zoom in karega, hum UI ko utna hi zoom out (scale down) kar denge
             const inverseScale = 1 / vv.scale;
             fixedUI.style.transform = `translate(${vv.offsetLeft}px, ${vv.offsetTop}px) scale(${inverseScale})`;
             fixedUI.style.width = `${vv.width * vv.scale}px`;
             fixedUI.style.height = `${vv.height * vv.scale}px`;
         }
         window.visualViewport.addEventListener('resize', lockUI);
         window.visualViewport.addEventListener('scroll', lockUI);
         lockUI(); // Run once to set initial state
     }

     // =========================================================
     // 2. FETCH PHONE & SET WATERMARK
     // =========================================================
     const userEmail = localStorage.getItem('customUserEmail');
     
     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone Provided";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) {
             console.error("Failed to fetch phone number");
         }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     // =========================================================
     // 3. SECURITY: ANTI-SCREENSHOT & BLUR
     // =========================================================
     window.addEventListener('blur', () => { document.body.classList.add('secure-mode'); });
     window.addEventListener('focus', () => { document.body.classList.remove('secure-mode'); });

     document.addEventListener('keydown', (e) => {
         if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) e.preventDefault();
         if (e.key === 'PrintScreen') {
            navigator.clipboard.writeText('Screenshots not allowed');
            document.body.classList.add('secure-mode');
            setTimeout(() => document.body.classList.remove('secure-mode'), 2000);
         }
     });

     // =========================================================
     // 4. RENDER HD PDF
     // =========================================================
     const urlParams = new URLSearchParams(window.location.search);
     let pdfUrl = urlParams.get('pdf');

     if(pdfUrl) {
         pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
         const container = document.getElementById('pdfContainer');

         pdfjsLib.getDocument({url: pdfUrl}).promise.then(async (pdfDoc) => {
             for (let num = 1; num <= pdfDoc.numPages; num++) {
                 const page = await pdfDoc.getPage(num);
                 const scale = 2.0; // High Quality Render
                 const viewport = page.getViewport({ scale });
                 
                 const wrapper = document.createElement('div');
                 wrapper.className = 'page-wrapper';
                 
                 const canvas = document.createElement('canvas');
                 const ctx = canvas.getContext('2d');
                 const dpr = window.devicePixelRatio || 1;

                 canvas.width = Math.floor(viewport.width * dpr);
                 canvas.height = Math.floor(viewport.height * dpr);
                 canvas.style.maxWidth = Math.floor(viewport.width) + "px";

                 const transform = dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null;
                 wrapper.appendChild(canvas);
                 container.appendChild(wrapper);

                 await page.render({ canvasContext: ctx, transform: transform, viewport: viewport }).promise;
             }
             document.getElementById('loadingState').style.display = 'none';
         }).catch(err => {
             document.getElementById('loadingState').innerHTML = "Failed to load Document. Check if link is valid.";
         });
     } else {
         document.getElementById('loadingState').innerHTML = "No PDF URL Provided.";
     }
  </script>
</body>
</html>
