<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>Secure Reader - PREMium Mind</title>
  <link rel="icon" type="image/png" href="small-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    :root {
      --pdf-scale: 1;
      --page-w: 100%;
      --ink: #111111;
      --muted: #6b7280;
      --line: #ececec;
      --amber: #f59e0b;
      --amber-soft: #fff7e6;
      --bg: #ffffff;
      --page-bg: #f7f7f8;
      --header-h: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: 'Outfit', system-ui, sans-serif;
      --display: 'Fraunces', Georgia, serif;
    }

    @media print { html, body { display: none !important; } }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      color: var(--ink);
      background: var(--page-bg);
      user-select: none;
      -webkit-user-select: none;
      transition: filter 0.3s ease;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .header {
      position: absolute;
      top: 0; left: 0;
      z-index: 1000;
      width: 100%;
      height: calc(var(--header-h) + var(--safe-top));
      padding: var(--safe-top) 14px 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8), 0 8px 24px rgba(17, 17, 17, 0.04);
      pointer-events: auto;
      animation: headerIn 0.4s ease both;
    }

    @keyframes headerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-btn {
      justify-self: start;
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      min-height: 42px;
      padding: 0 14px 0 10px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e8e8ea;
      box-shadow: 0 1px 2px rgba(17, 17, 17, 0.04), 0 4px 12px rgba(17, 17, 17, 0.04);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover {
      background: var(--amber-soft);
      border-color: #f6d98a;
      box-shadow: 0 2px 8px rgba(245, 158, 11, 0.18);
      transform: translateX(-1px);
    }
    .back-btn:active {
      transform: scale(0.97);
    }

    .back-btn .back-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .back-btn:hover .back-icon {
      background: var(--amber);
      transform: translateX(-1px);
    }
    .back-btn .back-icon svg {
      width: 14px;
      height: 14px;
      display: block;
    }
    .back-btn .back-label {
      letter-spacing: 0.01em;
      padding-right: 2px;
    }

    .brand-title {
      justify-self: center;
      font-family: var(--display);
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      white-space: nowrap;
      text-align: center;
    }
    .brand-title em {
      font-style: normal;
      color: var(--amber);
    }

    .header-actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .zoom-controls {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: #fff;
      border: 1px solid #e8e8ea;
      border-radius: 10px;
      padding: 2px;
      box-shadow: 0 1px 2px rgba(17, 17, 17, 0.04);
    }

    .zoom-btn {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }
    .zoom-btn:hover { background: var(--amber-soft); }
    .zoom-btn:active { background: #fde68a; }

    #zoomLabel {
      min-width: 44px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 650;
      color: var(--muted);
      user-select: none;
    }

    #status {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #92400e;
      background: var(--amber-soft);
      border: 1px solid #fde68a;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .download-btn {
      min-height: 40px;
      background: var(--ink);
      color: #fff;
      border: none;
      padding: 0 14px;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 650;
      font-size: 0.88rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      align-items: center;
      gap: 6px;
      display: inline-flex;
    }
    .download-btn:hover {
      background: #000;
      transform: translateY(-1px);
    }
    .download-btn:active { transform: translateY(0); }

    .download-btn.locked {
      background: #e5e7eb;
      color: #9ca3af;
    }
    .download-btn.locked:hover { transform: none; background: #e5e7eb; }

    .watermark-overlay {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100%;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      justify-items: center;
      align-items: center;
      overflow: hidden;
      z-index: 900;
      pointer-events: none;
    }

    .wm-item {
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: rgba(17, 17, 17, 0.06);
      transform: rotate(-32deg);
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .loader-container {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background:
        radial-gradient(circle at 50% 35%, var(--amber-soft), transparent 42%),
        var(--bg);
      animation: fadeBoot 0.3s ease both;
    }

    @keyframes fadeBoot {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loader {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid #eee;
      border-top-color: var(--amber);
      border-right-color: var(--ink);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      margin: 0;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .loader-container.is-error .loader-text {
      color: #b91c1c;
      font-weight: 650;
      text-align: center;
      max-width: 280px;
      padding: 0 20px;
    }

    .scroll-area {
      position: absolute;
      top: calc(var(--header-h) + var(--safe-top));
      left: 0;
      width: 100vw;
      height: calc(100vh - var(--header-h) - var(--safe-top));
      overflow-x: auto;
      overflow-y: auto;
      scroll-behavior: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-x pan-y;
      z-index: 10;
      pointer-events: auto;
      background:
        linear-gradient(180deg, #fafafa 0%, var(--page-bg) 100%);
      padding-bottom: var(--safe-bottom);
    }

    .pdf-viewer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 14px calc(28px + var(--safe-bottom));
      gap: 14px;
      width: max-content;
      min-width: 100%;
      margin: 0 auto;
      transform-origin: top center;
      will-change: width;
    }

    .page-wrapper {
      position: relative;
      width: calc(var(--page-w, 100%) * var(--pdf-scale));
      max-width: none;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 6px 20px rgba(17, 17, 17, 0.06);
      flex-shrink: 0;
      contain: layout paint;
    }

    .page-wrapper.is-loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, #f3f3f4 25%, #ebebec 37%, #f3f3f4 63%);
      background-size: 400% 100%;
      animation: shimmer 1.1s ease infinite;
    }

    @keyframes shimmer {
      0% { background-position: 100% 0; }
      100% { background-position: 0 0; }
    }

    .page-wrapper canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
      border-radius: 10px;
    }

    .secure-mode { filter: blur(25px) grayscale(100%); pointer-events: none; }

    @media (max-width: 700px) {
      :root { --header-h: 58px; }

      .header {
        padding-left: 10px;
        padding-right: 10px;
        gap: 6px;
      }

      .brand-title {
        font-size: 1rem;
        max-width: 42vw;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .back-btn {
        min-height: 40px;
        min-width: 40px;
        padding: 0;
        justify-content: center;
        gap: 0;
        border-radius: 50%;
      }
      .back-btn .back-label { display: none; }
      .back-btn .back-icon {
        width: 40px;
        height: 40px;
        background: #111;
      }
      .back-btn:hover .back-icon { background: var(--amber); }

      #status { display: none; }

      .zoom-controls { gap: 0; }
      .zoom-btn { width: 32px; height: 32px; font-size: 1.05rem; }
      #zoomLabel { min-width: 38px; font-size: 0.68rem; }

      .download-btn {
        min-height: 38px;
        padding: 0 10px;
        font-size: 0.82rem;
      }
      .download-btn svg { width: 15px; height: 15px; }
      #dl-text { display: none; }

      .pdf-viewer-container {
        padding: 10px 8px calc(22px + var(--safe-bottom));
        gap: 12px;
      }

      .page-wrapper {
        border-radius: 8px;
        box-shadow: 0 3px 12px rgba(17, 17, 17, 0.05);
      }

      .page-wrapper canvas { border-radius: 8px; }

      .wm-item { font-size: 9px; color: rgba(17, 17, 17, 0.05); }
      .watermark-overlay {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(5, 1fr);
      }
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="header">
    <a href="lecture.html" class="back-btn" onclick="window.history.back(); return false;" aria-label="Go back">
      <span class="back-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </span>
      <span class="back-label">Back</span>
    </a>
    <div class="brand-title">PREM<em>ium</em> Mind</div>
    <div class="header-actions">
      <div class="zoom-controls" aria-label="Zoom controls">
        <button type="button" class="zoom-btn" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">−</button>
        <span id="zoomLabel">100%</span>
        <button type="button" class="zoom-btn" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
      </div>
      <div id="status">Secure</div>
      <button id="downloadBtn" class="download-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span id="dl-text">Save</span>
      </button>
    </div>
  </div>

  <div class="watermark-overlay" id="wmLayer">
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
      <div class="wm-item"></div><div class="wm-item"></div><div class="wm-item"></div>
  </div>

  <div class="loader-container" id="loadingState">
     <div class="loader"></div>
     <p class="loader-text">Loading notes...</p>
  </div>

  <div class="scroll-area" id="scrollArea">
      <div class="pdf-viewer-container" id="pdfContainer"></div>
  </div>

  <script>
     // =========================================================
     // 1. GLOBAL NATIVE ZOOM BLOCKER (screenshot / pinch protection)
     // =========================================================
     document.addEventListener('touchmove', function(e) {
         if (e.touches && e.touches.length > 1) { e.preventDefault(); }
     }, { passive: false });

     // =========================================================
     // 2. FAST CSS ZOOM (no re-render — same as original concept)
     // =========================================================
     const scrollArea = document.getElementById('scrollArea');
     const zoomLabel = document.getElementById('zoomLabel');
     const ZOOM_MIN = 1;
     const ZOOM_MAX = 3.5;
     const ZOOM_STEP = 0.25;

     let currentScale = 1;
     let initialDistance = 0;
     let initialScale = 1;

     function clampScale(z) {
         return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(z * 100) / 100));
     }

     function applyScale(z) {
         currentScale = clampScale(z);
         document.documentElement.style.setProperty('--pdf-scale', currentScale);
         if (zoomLabel) zoomLabel.textContent = Math.round(currentScale * 100) + '%';
         // Instant CSS stretch (upar) + zoom pe sharp re-render (neeche)
         if (typeof window.__pdfOnZoom === 'function') {
             window.__pdfOnZoom();
         }
     }

     document.getElementById('zoomInBtn').addEventListener('click', () => {
         applyScale(currentScale + ZOOM_STEP);
     });
     document.getElementById('zoomOutBtn').addEventListener('click', () => {
         applyScale(currentScale - ZOOM_STEP);
     });
     zoomLabel.addEventListener('click', () => applyScale(1));

     scrollArea.addEventListener('touchstart', (e) => {
         if (e.touches.length === 2) {
             initialDistance = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             initialScale = currentScale;
         }
     }, { passive: false });

     scrollArea.addEventListener('touchmove', (e) => {
         if (e.touches.length === 2 && initialDistance > 0) {
             e.preventDefault();
             const dist = Math.hypot(
                 e.touches[0].clientX - e.touches[1].clientX,
                 e.touches[0].clientY - e.touches[1].clientY
             );
             applyScale(initialScale * (dist / initialDistance));
         }
     }, { passive: false });

     scrollArea.addEventListener('wheel', (e) => {
         if (e.ctrlKey || e.metaKey) {
             e.preventDefault();
             applyScale(currentScale + (e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP));
         }
     }, { passive: false });

     applyScale(1);

     // =========================================================
     // 3. FETCH PHONE & SET WATERMARK
     // =========================================================
     const userEmail = localStorage.getItem('customUserEmail') || localStorage.getItem('userEmail');
     
     if(!userEmail) {
         alert("Unauthorized Access!");
         window.location.href = "login.html";
     }

     async function fetchUserInfoAndSetWatermark() {
         let userPhone = "No Phone";
         try {
             const response = await fetch(`https://premind.diplomawallah.in/get_user.php?email=${encodeURIComponent(userEmail)}`);
             const data = await response.json();
             if (data.status === 'success' && data.phone && data.phone.trim() !== "") {
                 userPhone = data.phone;
             }
         } catch (error) { console.error("Failed to fetch phone number"); }

         const wmContent = `${userEmail}<br>+91 ${userPhone}`;
         document.querySelectorAll('.wm-item').forEach(el => el.innerHTML = wmContent);
     }
     fetchUserInfoAndSetWatermark();

     // =========================================================
     // 4. SECURITY: ANTI-SCREENSHOT & BLUR (mobile-safe)
     // =========================================================
     let secureBlurTimer = null;
     function enableSecureBlur() {
         document.body.classList.add('secure-mode');
     }
     function disableSecureBlur() {
         clearTimeout(secureBlurTimer);
         document.body.classList.remove('secure-mode');
     }

     // Reliable across devices: blur only when tab/app actually hidden
     document.addEventListener('visibilitychange', () => {
         if (document.hidden) enableSecureBlur();
         else disableSecureBlur();
     });

     // Desktop window switch (flaky on mobile) — auto-clear on any interaction
     window.addEventListener('blur', () => {
         if (!('ontouchstart' in window)) enableSecureBlur();
     });
     window.addEventListener('focus', disableSecureBlur);
     ['touchstart', 'pointerdown', 'click', 'scroll'].forEach(evt => {
         window.addEventListener(evt, () => {
             if (!document.hidden) disableSecureBlur();
         }, { passive: true });
     });

     document.addEventListener('keydown', (e) => {
         if (
             (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) ||
             (e.metaKey && (e.key === 'p' || e.key === 's' || e.key === 'c' || e.key === 'u')) ||
             (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'S' || e.key === 's')) ||
             e.key === 'PrintScreen'
         ) {
             e.preventDefault();
         }
         if (e.key === 'PrintScreen') {
             try { navigator.clipboard.writeText('Screenshots not allowed'); } catch (err) {}
             enableSecureBlur();
             secureBlurTimer = setTimeout(disableSecureBlur, 1500);
         }
     });

     document.addEventListener('keyup', (e) => {
         if (e.key === 'PrintScreen') {
             try { navigator.clipboard.writeText('Screenshots not allowed'); } catch (err) {}
             enableSecureBlur();
             secureBlurTimer = setTimeout(disableSecureBlur, 1500);
         }
     });

     // Safety: kabhi bhi stuck na rahe
     disableSecureBlur();

     // Drag / select block
     document.addEventListener('dragstart', (e) => e.preventDefault());
     document.addEventListener('selectstart', (e) => e.preventDefault());
     document.addEventListener('copy', (e) => e.preventDefault());
     document.addEventListener('cut', (e) => e.preventDefault());

     // =========================================================
     // 5. PDF FAST SECURE FETCH (single request)
     // =========================================================
     const API_BASE = 'https://premind.diplomawallah.in';
     const urlParams = new URLSearchParams(window.location.search);
     let pdfFile = urlParams.get('file');
     let legacyPdf = urlParams.get('pdf');
     let allowDownload = urlParams.get('download') === 'true' || urlParams.get('download') === '1';
     let customTitle = urlParams.get('title');
     const loadingState = document.getElementById('loadingState');
     const loaderText = loadingState ? loadingState.querySelector('.loader-text') : null;

     function setLoadMsg(msg) {
         if (loaderText) loaderText.textContent = msg;
     }

     function normalizePdfPath(raw) {
         if (!raw) return null;
         let f = String(raw).trim();
         try { f = decodeURIComponent(f); } catch (e) {}
         f = f.replace(/\\/g, '/');

         if (/proxy_pdf\.php/i.test(f)) {
             try {
                 const u = new URL(f, API_BASE);
                 const q = u.searchParams.get('file');
                 if (q) f = q;
             } catch (e) {
                 const m = f.match(/[?&]file=([^&]+)/i);
                 if (m) {
                     try { f = decodeURIComponent(m[1]); } catch (e2) { f = m[1]; }
                 }
             }
         }

         if (/^https?:\/\//i.test(f)) {
             try {
                 const u = new URL(f);
                 f = (u.pathname || '').replace(/^\/+/, '');
             } catch (e) {}
         }

         f = f.replace(/^\/+/, '');
         if (f && f.indexOf('/') === -1 && /\.pdf$/i.test(f)) f = 'uploads/pdfs/' + f;
         f = f.replace(/(?:uploads\/pdfs\/)+/i, 'uploads/pdfs/');
         return f || null;
     }

     if (!pdfFile && legacyPdf) pdfFile = normalizePdfPath(legacyPdf);
     else pdfFile = normalizePdfPath(pdfFile);

     async function fetchWithTimeout(url, options, ms) {
         const ctrl = new AbortController();
         const t = setTimeout(() => ctrl.abort(), ms);
         try {
             return await fetch(url, { ...options, signal: ctrl.signal });
         } finally {
             clearTimeout(t);
         }
     }

     // One POST only — much faster than token + second request
     async function fetchSecurePdfBytes() {
         setLoadMsg('Downloading PDF...');
         const res = await fetchWithTimeout(`${API_BASE}/secure_pdf.php`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ file: pdfFile, email: userEmail })
         }, 45000);

         if (!res.ok) {
             const msg = await res.text().catch(() => '');
             throw new Error(msg || ('PDF failed (' + res.status + ')'));
         }
         return await res.arrayBuffer();
     }

     if (pdfFile) {
         const downloadBtn = document.getElementById('downloadBtn');

         if (!allowDownload) {
             downloadBtn.classList.add('locked');
             document.getElementById('dl-text').innerText = "Locked";
         }

         downloadBtn.addEventListener('click', async () => {
             if (!allowDownload) {
                 alert("⚠️ Download available day of exam at 6:00 AM only.");
                 return;
             }

             const originalHtml = downloadBtn.innerHTML;
             downloadBtn.innerHTML = "⏳ Wait...";
             downloadBtn.disabled = true;

             try {
                 const buf = await fetchSecurePdfBytes();
                 const blob = new Blob([buf], { type: 'application/pdf' });
                 const blobUrl = URL.createObjectURL(blob);

                 let baseName = "Premium_Notes";
                 if (customTitle) {
                     baseName = decodeURIComponent(customTitle).replace(/[^a-zA-Z0-9 ]/g, "_");
                 } else {
                     const extractedName = pdfFile.substring(pdfFile.lastIndexOf('/') + 1);
                     if (extractedName) baseName = extractedName.replace(/\.pdf$/i, "");
                 }

                 const a = document.createElement('a');
                 a.href = blobUrl;
                 a.download = `${baseName}_PREMium_Mind.pdf`;
                 document.body.appendChild(a);
                 a.click();
                 document.body.removeChild(a);
                 URL.revokeObjectURL(blobUrl);
                 downloadBtn.innerHTML = "✅ Done";
             } catch (error) {
                 console.error(error);
                 alert("Download Failed: " + (error.message || "Connection secure layer active."));
                 downloadBtn.innerHTML = "❌ Failed";
             }

             setTimeout(() => {
                 downloadBtn.innerHTML = originalHtml;
                 downloadBtn.disabled = false;
             }, 2000);
         });
     }

     // =========================================================
     // 6. FAST + SHARP + NO CRASH — fit-width, lazy pages
     // =========================================================
     if (pdfFile) {
         const container = document.getElementById('pdfContainer');

         pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

         (async () => {
             try {
                 setLoadMsg('Connecting...');
                 const pdfData = await fetchSecurePdfBytes();
                 setLoadMsg('Opening pages...');

                 const bytes = new Uint8Array(pdfData);
                 const pdfDoc = await pdfjsLib.getDocument({
                     data: bytes,
                     disableAutoFetch: true,
                     disableStream: true
                 }).promise;

                 // Fit page to screen width; zoom pe higher scale re-render hota hai
                 const firstPage = await pdfDoc.getPage(1);
                 const baseVp = firstPage.getViewport({ scale: 1 });
                 const pad = window.innerWidth < 700 ? 20 : 36;
                 const cssWidth = Math.min(900, Math.max(260, scrollArea.clientWidth - pad));
                 const fitScale = cssWidth / baseVp.width;
                 document.documentElement.style.setProperty('--page-w', cssWidth + 'px');

                 // Full retina quality — lazy render karta hai isliye memory safe
                 const isMobile = window.innerWidth < 700 || /Android|iPhone|iPad/i.test(navigator.userAgent);
                 const basePixelRatio = Math.min(Math.max(window.devicePixelRatio || 1, 2), 3);
                 const MAX_EDGE = isMobile ? 4000 : 5200;

                 const pageSlots = [];
                 const renderTasks = new Map();
                 const BUFFER = 1;

                 // Placeholders pehle — scroll smooth, height ready
                 for (let num = 1; num <= pdfDoc.numPages; num++) {
                     const wrapper = document.createElement('div');
                     wrapper.className = 'page-wrapper is-loading';
                     wrapper.dataset.page = String(num);
                     wrapper.style.aspectRatio = baseVp.width + ' / ' + baseVp.height;
                     container.appendChild(wrapper);
                     pageSlots[num] = { wrapper, ready: false, rendering: false, renderedScale: 0 };
                 }

                 async function paintPage(num) {
                     const slot = pageSlots[num];
                     if (!slot || slot.rendering) return;
                     const targetScale = fitScale * currentScale;
                     if (slot.ready && Math.abs(slot.renderedScale - targetScale) < 0.001) return;
                     slot.rendering = true;

                     try {
                         const page = await pdfDoc.getPage(num);
                         const viewport = page.getViewport({ scale: targetScale });

                         // Device pixels — cap so Chrome "Aw Snap" na aaye
                         let pr = basePixelRatio;
                         const longEdge = Math.max(viewport.width, viewport.height) * pr;
                         if (longEdge > MAX_EDGE) {
                             pr = MAX_EDGE / Math.max(viewport.width, viewport.height);
                         }

                         const canvas = document.createElement('canvas');
                         const ctx = canvas.getContext('2d', { alpha: false });
                         canvas.width = Math.floor(viewport.width * pr);
                         canvas.height = Math.floor(viewport.height * pr);
                         canvas.style.width = '100%';
                         canvas.style.height = 'auto';

                         const transform = pr !== 1 ? [pr, 0, 0, pr, 0, 0] : null;
                         const task = page.render({ canvasContext: ctx, transform, viewport });
                         renderTasks.set(num, task);
                         await task.promise;
                         renderTasks.delete(num);

                         slot.wrapper.innerHTML = '';
                         slot.wrapper.appendChild(canvas);
                         slot.wrapper.classList.remove('is-loading');
                         slot.wrapper.style.aspectRatio = '';
                         slot.ready = true;
                         slot.renderedScale = targetScale;
                     } catch (err) {
                         if (err && err.name === 'RenderingCancelledException') return;
                         console.warn('page render failed', num, err);
                         slot.wrapper.classList.remove('is-loading');
                     } finally {
                         slot.rendering = false;
                     }
                 }

                 function releasePage(num) {
                     const slot = pageSlots[num];
                     if (!slot || !slot.ready) return;
                     const task = renderTasks.get(num);
                     if (task) {
                         try { task.cancel(); } catch (e) {}
                         renderTasks.delete(num);
                     }
                     const canvas = slot.wrapper.querySelector('canvas');
                     if (canvas) {
                         canvas.width = 0;
                         canvas.height = 0;
                     }
                     slot.wrapper.innerHTML = '';
                     slot.wrapper.classList.add('is-loading');
                     slot.wrapper.style.aspectRatio = baseVp.width + ' / ' + baseVp.height;
                     slot.ready = false;
                     slot.rendering = false;
                     slot.renderedScale = 0;
                 }

                 function visibleRange() {
                     const rootRect = scrollArea.getBoundingClientRect();
                     let first = 1;
                     let last = pdfDoc.numPages;
                     let found = false;
                     for (let num = 1; num <= pdfDoc.numPages; num++) {
                         const r = pageSlots[num].wrapper.getBoundingClientRect();
                         const onScreen = r.bottom >= rootRect.top - 80 && r.top <= rootRect.bottom + 80;
                         if (onScreen) {
                             if (!found) { first = num; found = true; }
                             last = num;
                         } else if (found) {
                             break;
                         }
                     }
                     return {
                         from: Math.max(1, first - BUFFER),
                         to: Math.min(pdfDoc.numPages, last + BUFFER)
                     };
                 }

                 let syncScheduled = false;
                 async function syncVisiblePages() {
                     syncScheduled = false;
                     const { from, to } = visibleRange();
                     const jobs = [];
                     for (let num = 1; num <= pdfDoc.numPages; num++) {
                         if (num >= from && num <= to) jobs.push(paintPage(num));
                         else if (num < from - 2 || num > to + 2) releasePage(num);
                     }
                     await Promise.all(jobs);
                 }

                 function scheduleSync() {
                     if (syncScheduled) return;
                     syncScheduled = true;
                     requestAnimationFrame(() => { syncVisiblePages(); });
                 }
                 window.__pdfScheduleSync = scheduleSync;

                 // Zoom change → visible pages ko us zoom pe sharp re-render (debounced)
                 let zoomRenderTimer = null;
                 window.__pdfOnZoom = function () {
                     clearTimeout(zoomRenderTimer);
                     zoomRenderTimer = setTimeout(() => { syncVisiblePages(); }, 250);
                 };

                 // Page 1 pehle → loader band, text jaldi
                 await paintPage(1);
                 loadingState.style.display = 'none';

                 // Nearby pages, phir scroll pe lazy
                 if (pdfDoc.numPages >= 2) await paintPage(2);
                 scheduleSync();

                 scrollArea.addEventListener('scroll', scheduleSync, { passive: true });
                 window.addEventListener('resize', scheduleSync, { passive: true });
             } catch (err) {
                 console.error(err);
                 loadingState.classList.add('is-error');
                 const tip = (err && err.name === 'AbortError')
                     ? 'Timeout — PDF bahut badi hai ya server slow hai. Dobara try karo.'
                     : ((err && err.message) ? String(err.message).slice(0, 140) : 'Load failed');
                 loadingState.innerHTML = "<p class='loader-text'>PDF open nahi hua.<br><span style='font-weight:500;font-size:0.85rem;opacity:.85'>" + tip + "</span></p>";
             }
         })();
     } else {
         loadingState.classList.add('is-error');
         loadingState.innerHTML = "<p class='loader-text'>No PDF file provided.</p>";
     }
  </script>
</body>
</html>
