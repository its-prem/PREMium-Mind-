<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUT Mail Sender</title>
  
  <!-- Modern Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 25px;
    }

    .header h1 {
      color: #1e293b;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      color: #64748b;
      font-size: 14px;
      margin-top: 5px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #475569;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #f8fafc;
    }

    input:focus {
      border-color: #3b82f6;
      background: #ffffff;
      outline: none;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .preview-box {
      margin-top: 25px;
      padding: 20px;
      background: #f1f5f9;
      border-left: 4px solid #3b82f6;
      border-radius: 8px;
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none; /* Hidden until user types */
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .preview-title {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 25px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to right, #2563eb, #3b82f6);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    button:active {
      transform: translateY(1px);
    }

    @media(max-width: 600px) {
      .container { padding: 25px 20px; }
      .header h1 { font-size: 24px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>JUT Mail Sender ✉️</h1>
      <p>Fill in your details to auto-generate and send your fee request.</p>
    </div>

    <div class="input-group">
      <label>Student Name</label>
      <input type="text" id="name" placeholder="E.g. Rahul Kumar" onkeyup="updatePreview()" />
    </div>

    <div class="input-group">
      <label>College Name</label>
      <input type="text" id="college" placeholder="E.g. Government Polytechnic" onkeyup="updatePreview()" />
    </div>

    <div class="input-group">
      <label>Branch</label>
      <input type="text" id="branch" placeholder="E.g. Computer Science" onkeyup="updatePreview()" />
    </div>

    <!-- Live Preview Section -->
    <div class="preview-box" id="previewContainer">
      <div class="preview-title">Email Preview</div>
      <div id="emailPreview"></div>
    </div>

    <button onclick="sendMail()">Open in Gmail / Email App</button>
  </div>

  <script>
    // Function to generate the email body dynamically
    function getEmailBody(name, college, branch) {
      const studentName = name || "[Your Name]";
      const studentCollege = college || "[Your College]";
      const studentBranch = branch || "[Your Branch]";

      return `Respected Sir/Madam,

I am ${studentName}, a student of ${studentBranch} branch from ${studentCollege}.

No external examination is scheduled for our Semester 6 because Industrial Training was arranged instead of regular exams.

However, students are being asked to pay an exam fee of ₹1700.

I kindly request that the exam fee should be reduced for those branches whose external examination is not being conducted.

Thank you.

Yours obediently,
${studentName}
${studentBranch}
${studentCollege}`;
    }

    // Function to update live preview as user types
    function updatePreview() {
      let name = document.getElementById('name').value.trim();
      let college = document.getElementById('college').value.trim();
      let branch = document.getElementById('branch').value.trim();
      
      let previewContainer = document.getElementById('previewContainer');
      let emailPreview = document.getElementById('emailPreview');

      // Show preview box if user starts typing
      if (name || college || branch) {
        previewContainer.style.display = 'block';
      } else {
        previewContainer.style.display = 'none';
      }

      emailPreview.innerText = getEmailBody(name, college, branch);
    }

    // Function to send mail
    function sendMail() {
      let name = document.getElementById('name').value.trim();
      let college = document.getElementById('college').value.trim();
      let branch = document.getElementById('branch').value.trim();

      if(name === '' || college === '' || branch === '') {
        alert('⚠️ Please fill out all fields before sending.');
        return;
      }

      let emailTo = 'jutexaminations@gmail.com'; // Updated Email ID
      let subject = 'Request Regarding Semester 6 Exam Fee';
      let body = getEmailBody(name, college, branch);

      let mailUrl = `mailto:${emailTo}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

      // Open email client
      window.location.href = mailUrl;
    }
  </script>

</body>
</html>
