<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JUT Fee Request Mail</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .container{
      background:white;
      padding:25px;
      width:90%;
      max-width:600px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:20px;
      border:none;
      background:#007bff;
      color:white;
      font-size:18px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>JUT Mail Request Form</h2>

  <input type="text" id="name" placeholder="Enter Student Name">

  <input type="text" id="college" placeholder="Enter College Name">

  <input type="text" id="branch" placeholder="Enter Branch Name">

  <button onclick="sendMail()">Send Mail</button>

</div>

<script>

function sendMail(){

  let name = document.getElementById("name").value;
  let college = document.getElementById("college").value;
  let branch = document.getElementById("branch").value;

  let subject = "Request Regarding Semester 6 Exam Fee";

  let body =
`Respected Sir/Madam,

I am ${name}, a student of ${branch} branch from ${college}.

No external examination is scheduled for our Semester 6 because Industrial Training was arranged instead of regular exams.

However, students are being asked to pay an exam fee of ₹1700.

I kindly request that the exam fee should be reduced for those branches whose external examination is not being conducted.

Thank you.

Yours obediently,
${name}
${branch}
${college}`;

  let mail = `mailto:prem@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

  window.location.href = mail;
}

</script>

</body>
</html>
