<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LearnTrack | Mobile Outreach</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --primary: #4f46e5;
            --success: #10b981;
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* Sticky Header for Mobile */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            margin-bottom: 25px;
        }

        .brand {
            text-align: center;
            margin-bottom: 15px;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .brand p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-box span {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .stat-box strong {
            font-size: 1.4rem;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--glass-border);
            padding: 14px 20px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input:focus { background: rgba(255, 255, 255, 0.3); }

        /* Card List Layout */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 40px;
        }

        .student-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, background 0.3s;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .email-text {
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-send {
            background: white;
            color: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: 0.2s;
            flex-shrink: 0;
        }

        .btn-send:active { transform: scale(0.95); }

        /* Sent State */
        .student-card.sent-status {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .student-card.sent-status .btn-send {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .student-card {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .btn-send {
                width: 100%;
                padding: 14px;
                font-size: 1rem;
            }
            .email-text {
                white-space: normal;
                word-break: break-all;
            }
        }
    </style>

    <script>
        let sentCount = 0;

        function updateStats() {
            const cards = document.querySelectorAll('.student-card');
            document.getElementById('totalCount').innerText = cards.length;
            document.getElementById('sentCount').innerText = sentCount;
        }

        function getInitials(email) {
            return email.charAt(0).toUpperCase();
        }

        function sendMail(email, btn) {
            // Highly optimized plain-text email for mailto:
            const subject = "🚀 Action Required: LearnTrack Internship Selection Confirmation";
            const body = `Dear Student,

🎉 Congratulations on your selection!

Team LearnTrack is thrilled to officially welcome you to our Internship Program. Your application stood out, and we are excited to see you grow with us.

📌 NEXT STEPS (URGENT):
To complete your onboarding and receive your daily class schedules, assignments, and meeting links, you must join our official communication group immediately.

👉 Official WhatsApp Group Link:
https://chat.whatsapp.com/H9N68jNP6e2Ep4VzN0f0Nb


We look forward to a fantastic learning journey with you!

Warm Regards,
Team LearnTrack
`;

            window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

            const card = btn.closest('.student-card');
            if (!card.classList.contains("sent-status")) {
                card.classList.add("sent-status");
                btn.innerHTML = "Sent ✓";
                sentCount++;
                updateStats();
            }
        }

        function filterEmails() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const cards = document.querySelectorAll(".student-card");
            cards.forEach(card => {
                const email = card.querySelector(".email-text").innerText.toLowerCase();
                card.style.display = email.includes(query) ? "flex" : "none";
            });
        }

        // Initialize avatars on load
        window.onload = () => {
            document.querySelectorAll('.student-card').forEach(card => {
                const email = card.querySelector('.email-text').innerText;
                card.querySelector('.avatar').innerText = getInitials(email);
            });
            updateStats();
        };
    </script>
</head>
<body>

<div class="app-container">
    
    <div class="sticky-header">

        </div>

        <div class="stats-row">

                <span>Total</span>

            </div>

        <input type="text" id="searchInput" class="search-input" onkeyup="filterEmails()" placeholder="🔍 Search email...">
